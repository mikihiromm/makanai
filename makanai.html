<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賄い献立</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic Pro','Meiryo','Yu Gothic',sans-serif;background:#f7f6f3;color:#222;font-size:15px}
.app{max-width:980px;margin:0 auto;padding:1rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e8e8e0}
.title{font-size:19px;font-weight:700;color:#2d2d2d}
.title span{font-size:13px;font-weight:400;color:#888;margin-left:8px}
.persons-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.persons-group label{font-size:13px;color:#777}
.toggle-group{display:flex;border:1px solid #ccc;border-radius:8px;overflow:hidden}
.toggle-btn{padding:6px 13px;font-size:13px;background:#fff;border:none;cursor:pointer;color:#777;transition:all 0.15s}
.toggle-btn.active{background:#3d6b4f;color:#fff;font-weight:600}
.nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.nav-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:14px;color:#555}
.nav-btn:hover{background:#f5f5f5}
.month-label{font-size:17px;font-weight:700;color:#2d2d2d;min-width:120px;text-align:center}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:1rem}
.day-header{text-align:center;font-size:12px;color:#888;padding:4px 0;font-weight:600}
.day-header.sun{color:#e24b4a}.day-header.sat{color:#378add}
.day-cell{min-height:90px;background:#fff;border:1px solid #e8e8e0;border-radius:8px;padding:5px;cursor:pointer;transition:all 0.15s}
.day-cell:hover{border-color:#3d6b4f;background:#f6fbf8}
.day-cell.empty{background:transparent;border-color:transparent;cursor:default}
.day-cell.today{border-color:#3d6b4f;border-width:2px}
.day-num{font-size:12px;font-weight:600;color:#888;margin-bottom:3px}
.day-num.sun{color:#e24b4a}.day-num.sat{color:#378add}
.meal-tag{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;line-height:1.4;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-tag{background:#d1fae5;color:#065f46}
.side-tag{background:#fef9c3;color:#854d0e}
.genre-和{background:#fce7f3;color:#9d174d}
.genre-洋{background:#dbeafe;color:#1e40af}
.genre-中{background:#ffedd5;color:#9a3412}
.tool-btn{padding:6px 14px;font-size:13px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;color:#555}
.tool-btn:hover{background:#f5f5f5}
.bottom-nav{display:flex;gap:8px;margin-top:1rem;border-top:1px solid #e8e8e0;padding-top:1rem}
.bottom-nav-btn{flex:1;padding:9px;font-size:14px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;color:#777}
.bottom-nav-btn.active{background:#3d6b4f;color:#fff;font-weight:600}
.view-body{min-height:300px}
.mgmt-section{margin-bottom:1.5rem}
.mgmt-title{font-size:15px;font-weight:700;color:#2d2d2d;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #e8e8e0}
.dish-list{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;margin-bottom:10px}
.dish-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border:1px solid #e8e8e0;border-radius:8px;font-size:13px;background:#fff}
.dish-item-name{color:#222;flex:1}
.dish-item-cat{font-size:11px;color:#888;margin:0 6px}
.dish-item-genre{font-size:11px;padding:1px 6px;border-radius:4px}
.add-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;border:1px solid #e8e8e0;border-radius:10px;background:#fafaf8}
.add-form input,.add-form select,.add-form textarea{padding:7px 10px;border:1px solid #ccc;border-radius:8px;font-size:13px;background:#fff;color:#222;font-family:inherit}
.add-form textarea{grid-column:1/-1;resize:vertical;min-height:60px}
.add-form .full{grid-column:1/-1}
.save-btn{grid-column:1/-1;padding:8px;background:#3d6b4f;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:#fff}
.save-btn:hover{background:#2d5a3e}
.section-label{font-size:13px;color:#555;margin-bottom:5px;font-weight:600}
.recipe-box{background:#f5f5f2;border-radius:8px;padding:11px;margin-bottom:8px;font-size:13px;line-height:1.8;color:#222}
.recipe-title{font-size:12px;font-weight:600;color:#777;margin-bottom:4px}
.portion-badge{font-size:12px;color:#fff;background:#3d6b4f;border-radius:6px;padding:3px 10px;display:inline-block;margin-left:6px}
.shuffle-btn{padding:5px 13px;font-size:12px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:#fff;color:#555}
.shuffle-btn:hover{background:#f0f0f0}
.meal-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.divider{border:none;border-top:1px solid #e8e8e0;margin:12px 0}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:17px;font-weight:700;color:#2d2d2d}
.close-btn{background:#f0f0f0;border:none;font-size:18px;cursor:pointer;color:#555;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:#e0e0e0}
.genre-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-left:6px;vertical-align:middle}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">賄い献立 <span>スタッフ食</span></div>
    <div class="persons-group">
      <label>人数：</label>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-4" onclick="setPersons(4)">4人</button>
        <button class="toggle-btn" id="btn-5" onclick="setPersons(5)">5人</button>
        <button class="toggle-btn" id="btn-6" onclick="setPersons(6)">6人</button>
        <button class="toggle-btn" id="btn-7" onclick="setPersons(7)">7人</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="bottom-nav-btn active" onclick="showView('calendar')">カレンダー</button>
    <button class="bottom-nav-btn" onclick="showView('manage')">料理管理</button>
  </div>

  <div id="view-calendar" class="view-body" style="margin-top:1rem">
    <div class="nav">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <div class="month-label" id="month-label"></div>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      <button class="tool-btn" onclick="regen()">再生成</button>
      <button class="tool-btn" onclick="printMonth()">印刷</button>
      <button class="tool-btn" onclick="downloadJSON()">保存</button>
      <button class="tool-btn" onclick="document.getElementById('import-file').click()">読込</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
    <div class="calendar" id="calendar"></div>
  </div>

  <div id="view-manage" class="view-body" style="margin-top:1rem;display:none">
    <div class="mgmt-section">
      <div class="mgmt-title">主菜一覧（<span id="main-count">0</span>品）</div>
      <div class="dish-list" id="main-list"></div>
    </div>
    <div class="mgmt-section">
      <div class="mgmt-title">副菜一覧（<span id="side-count">0</span>品）</div>
      <div class="dish-list" id="side-list"></div>
    </div>
    <div class="mgmt-section">
      <div class="mgmt-title">料理を追加</div>
      <div class="add-form">
        <input type="text" id="new-name" placeholder="料理名">
        <select id="new-type"><option value="main">主菜</option><option value="side">副菜</option></select>
        <select id="new-genre"><option value="和">和食</option><option value="洋">洋食</option><option value="中">中華</option></select>
        <select id="new-cat">
          <option value="魚">魚介</option><option value="肉">肉料理</option><option value="豆腐">豆腐・豆</option>
          <option value="野菜">野菜</option><option value="卵">卵料理</option><option value="麺・ご飯">麺・ご飯</option>
          <option value="スープ">スープ・汁物</option><option value="その他">その他</option>
        </select>
        <input type="text" id="new-ing4" placeholder="材料（4人分）" class="full">
        <input type="text" id="new-ing7" placeholder="材料（7人分）" class="full">
        <textarea id="new-recipe" placeholder="作り方（①②③…と書く）"></textarea>
        <button class="save-btn" onclick="addDish()">追加する</button>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-date"></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
let persons=4,currentYear=new Date().getFullYear(),currentMonth=new Date().getMonth(),schedule={};

// 材料は4人分と7人分を記載。途中の人数は補間表示
const mainDishes=[
  // 和食
  {id:1,name:"さばの味噌煮",genre:"和",cat:"魚",ing4:"さば4切れ・味噌大4・みりん大4・砂糖大2・生姜2片・酒大4",ing7:"さば7切れ・味噌大7・みりん大7・砂糖大3・生姜3片・酒大7",recipe:"①さばに熱湯をかけ臭みを取る。②鍋に水・調味料・生姜を煮立てる。③さばを加え落し蓋で15分煮る。④煮汁を煮詰めて完成。"},
  {id:2,name:"鶏の照り焼き",genre:"和",cat:"肉",ing4:"鶏もも600g・醤油大4・みりん大4・砂糖大2・サラダ油少々",ing7:"鶏もも1kg・醤油大7・みりん大7・砂糖大3・サラダ油少々",recipe:"①鶏肉は一口大に切る。②フライパンで皮目から焼く。③タレを加えて絡め蒸し焼きにする。"},
  {id:3,name:"肉じゃが",genre:"和",cat:"肉",ing4:"牛薄切り300g・じゃがいも6個・玉ねぎ2個・だし600ml・醤油大6・みりん大4・砂糖大2",ing7:"牛薄切り500g・じゃがいも10個・玉ねぎ3個・だし1L・醤油大10・みりん大6・砂糖大3",recipe:"①じゃがいもは一口大に切る。②鍋で肉と玉ねぎを炒める。③じゃがいも・だし・調味料を加え煮る。"},
  {id:4,name:"豚の生姜焼き",genre:"和",cat:"肉",ing4:"豚ロース薄切り400g・玉ねぎ1個・醤油大4・みりん大2・生姜大2",ing7:"豚ロース薄切り700g・玉ねぎ2個・醤油大7・みりん大3・生姜大3",recipe:"①豚肉に下味をつける。②フライパンで玉ねぎを炒める。③豚肉を加えタレで絡める。"},

  {id:6,name:"豚汁",genre:"和",cat:"スープ",ing4:"豚バラ200g・大根200g・にんじん2本・ごぼう1本・こんにゃく1枚・味噌大6・だし1.2L",ing7:"豚バラ350g・大根350g・にんじん3本・ごぼう2本・こんにゃく2枚・味噌大10・だし2L",recipe:"①野菜を切り豚肉と炒める。②だしを加えて煮る。③野菜が柔らかくなったら味噌を溶く。"},
  {id:7,name:"筑前煮",genre:"和",cat:"野菜",ing4:"鶏もも300g・れんこん200g・にんじん2本・ごぼう1本・こんにゃく1枚・だし400ml・醤油大6・みりん大4・砂糖大2",ing7:"鶏もも500g・れんこん350g・にんじん3本・ごぼう2本・こんにゃく2枚・だし700ml・醤油大10・みりん大6・砂糖大3",recipe:"①材料を切り鶏肉から炒める。②野菜を加える。③だし・調味料で汁気がなくなるまで煮る。"},
  {id:8,name:"茶碗蒸し",genre:"和",cat:"卵",ing4:"卵6個・だし900ml・醤油小2・塩少々・鶏肉100g・三つ葉少々",ing7:"卵10個・だし1.5L・醤油大1・塩少々・鶏肉175g・三つ葉少々",recipe:"①卵をよく溶きだしと調味料を混ぜ濾す。②具材を入れて卵液を注ぐ。③蒸し器で中火10分・弱火5分蒸す。"},

  {id:20,name:"鶏の水炊き",genre:"和",cat:"肉",ing4:"鶏もも500g・白菜8枚・豆腐2丁・春菊1束・ポン酢・だし800ml",ing7:"鶏もも900g・白菜14枚・豆腐3丁・春菊2束・ポン酢・だし1.4L",recipe:"①昆布でだしをとる。②鶏肉をアクを取りながら煮る。③野菜・豆腐を加えポン酢で食べる。"},

function getIngredient(dish, n) {
  // 4人分と7人分の中間を補間
  const base4 = dish.ing4;
  const base7 = dish.ing7;
  if (n <= 4) return base4 + `（${n}人分に調整）`;
  if (n >= 7) return base7;
  // 5〜6人分は参考表示
  return base4 + `（${n}人分：上記の約${Math.round((n/4)*10)/10}倍）`;
}

function setPersons(n){
  persons=n;
  [4,5,6,7].forEach(i=>{
    document.getElementById(`btn-${i}`).classList.toggle('active',i===n);
  });
}
function showView(v){
  document.getElementById('view-calendar').style.display=v==='calendar'?'block':'none';
  document.getElementById('view-manage').style.display=v==='manage'?'block':'none';
  document.querySelectorAll('.bottom-nav-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&v==='calendar')||(i===1&&v==='manage'));
  });
  if(v==='manage') renderManage();
}
function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function getFirstDay(y,m){return new Date(y,m,1).getDay();}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function generateSchedule(y,m){
  const days=getDaysInMonth(y,m),sm=shuffle(mainDishes),ss=shuffle(sideDishes),sch={};
  for(let d=1;d<=days;d++) sch[d]={main:sm[(d-1)%sm.length],sides:[ss[(d*2-2)%ss.length],ss[(d*2-1)%ss.length]]};
  schedule[`${y}-${m}`]=sch;
}
function getSchedule(y,m){const k=`${y}-${m}`;if(!schedule[k])generateSchedule(y,m);return schedule[k];}

function genreColor(g){
  if(g==='和') return 'background:#fce7f3;color:#9d174d';
  if(g==='洋') return 'background:#dbeafe;color:#1e40af';
  return 'background:#ffedd5;color:#9a3412';
}

function renderCalendar(){
  document.getElementById('month-label').textContent=`${currentYear}年${currentMonth+1}月`;
  const cal=document.getElementById('calendar');
  const dn=['日','月','火','水','木','金','土'],dc=['sun','','','','','','sat'];
  let html=dn.map((d,i)=>`<div class="day-header ${dc[i]}">${d}</div>`).join('');
  const first=getFirstDay(currentYear,currentMonth),total=getDaysInMonth(currentYear,currentMonth);
  const sch=getSchedule(currentYear,currentMonth),today=new Date();
  for(let i=0;i<first;i++) html+=`<div class="day-cell empty"></div>`;
  for(let d=1;d<=total;d++){
    const dow=(first+d-1)%7,isToday=today.getFullYear()===currentYear&&today.getMonth()===currentMonth&&today.getDate()===d;
    const meal=sch[d],nc=dow===0?'sun':dow===6?'sat':'';
    html+=`<div class="day-cell${isToday?' today':''}" onclick="openDay(${d})">
      <div class="day-num ${nc}">${d}</div>
      ${meal?`<span class="meal-tag main-tag">${meal.main.name}</span><span class="meal-tag side-tag">${meal.sides[0].name}</span><span class="meal-tag side-tag">${meal.sides[1].name}</span>`:''}
    </div>`;
  }
  cal.innerHTML=html;
}
function openDay(d){
  const sch=getSchedule(currentYear,currentMonth),meal=sch[d];
  if(!meal) return;
  const ing = persons <= 4 ? 'ing4' : 'ing7';
  const pLabel=`${persons}人分`;
  document.getElementById('modal-date').textContent=`${currentMonth+1}月${d}日の賄い`;
  const sidesHtml=meal.sides.map((s,idx)=>`
    <div style="margin-bottom:12px">
      <div class="meal-section-header">
        <div class="section-label">副菜${idx+1}：${s.name} <span class="genre-badge" style="${genreColor(s.genre)}">${s.genre}</span></div>
        <button class="shuffle-btn" onclick="swapSide(${d},${idx})">変える</button>
      </div>
      <div class="recipe-box">
        <div class="recipe-title">材料（${pLabel}目安）</div><div>${s[ing]}</div>
        <div class="recipe-title" style="margin-top:6px">作り方</div><div>${s.recipe.replace(/。(?!$)/g,'。<br>')}</div>
      </div>
    </div>`).join('');
  document.getElementById('modal-body').innerHTML=`
    <div class="meal-section-header">
      <div class="section-label">主菜：${meal.main.name} <span class="genre-badge" style="${genreColor(meal.main.genre)}">${meal.main.genre}</span> <span class="portion-badge">${pLabel}</span></div>
      <button class="shuffle-btn" onclick="swapMain(${d})">変える</button>
    </div>
    <div class="recipe-box">
      <div class="recipe-title">材料</div><div>${meal.main[ing]}</div>
      <div class="recipe-title" style="margin-top:6px">作り方</div><div>${meal.main.recipe.replace(/。(?!$)/g,'。<br>')}</div>
    </div>
    <div class="divider"></div>
    ${sidesHtml}`;
  document.getElementById('modal-overlay').classList.add('open');
}
function swapMain(d){
  const k=`${currentYear}-${currentMonth}`,sch=schedule[k],cur=sch[d].main;
  const others=mainDishes.filter(m=>m.id!==cur.id);
  if(others.length){sch[d].main=others[Math.floor(Math.random()*others.length)];renderCalendar();openDay(d);}
}
function swapSide(d,idx){
  const k=`${currentYear}-${currentMonth}`,sch=schedule[k],cur=sch[d].sides[idx];
  const avail=sideDishes.filter(s=>s.id!==cur.id&&s.id!==sch[d].sides[1-idx].id);
  if(avail.length){sch[d].sides[idx]=avail[Math.floor(Math.random()*avail.length)];renderCalendar();openDay(d);}
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay')) closeModal();}
function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth<0){currentMonth=11;currentYear--;}
  if(currentMonth>11){currentMonth=0;currentYear++;}
  renderCalendar();
}
function regen(){delete schedule[`${currentYear}-${currentMonth}`];renderCalendar();}
function renderManage(){
  document.getElementById('main-count').textContent=mainDishes.length;
  document.getElementById('side-count').textContent=sideDishes.length;
  document.getElementById('main-list').innerHTML=mainDishes.map(d=>`<div class="dish-item"><span class="dish-item-name">${d.name}</span><span class="genre-badge dish-item-genre" style="${genreColor(d.genre)}">${d.genre}</span><span class="dish-item-cat">${d.cat}</span></div>`).join('');
  document.getElementById('side-list').innerHTML=sideDishes.map(d=>`<div class="dish-item"><span class="dish-item-name">${d.name}</span><span class="genre-badge dish-item-genre" style="${genreColor(d.genre)}">${d.genre}</span><span class="dish-item-cat">${d.cat}</span></div>`).join('');
}
function addDish(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){alert('料理名を入力してください');return;}
  const dish={id:Date.now(),name,genre:document.getElementById('new-genre').value,cat:document.getElementById('new-cat').value,
    ing4:document.getElementById('new-ing4').value.trim(),
    ing7:document.getElementById('new-ing7').value.trim(),
    recipe:document.getElementById('new-recipe').value.trim()};
  if(document.getElementById('new-type').value==='main') mainDishes.push(dish); else sideDishes.push(dish);
  ['new-name','new-ing4','new-ing7','new-recipe'].forEach(id=>document.getElementById(id).value='');
  renderManage();
  alert(`「${name}」を追加しました！`);
}
function downloadJSON(){
  const sch=getSchedule(currentYear,currentMonth);
  const data={version:1,year:currentYear,month:currentMonth+1,persons,mainDishes,sideDishes,
    schedule:Object.fromEntries(Object.entries(sch).map(([d,m])=>([d,{mainId:m.main.id,sideIds:m.sides.map(s=>s.id)}])))};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`賄い献立_${currentYear}年${currentMonth+1}月.json`;
  a.click();
}
function importJSON(event){
  const file=event.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.version!==1) throw new Error();
      data.mainDishes.forEach(d=>{if(!mainDishes.find(m=>m.id===d.id)) mainDishes.push(d);});
      data.sideDishes.forEach(d=>{if(!sideDishes.find(s=>s.id===d.id)) sideDishes.push(d);});
      const y=data.year,m=data.month-1,rebuilt={};
      for(const [day,ids] of Object.entries(data.schedule)){
        const main=mainDishes.find(d=>d.id===ids.mainId);
        const sides=ids.sideIds.map(id=>sideDishes.find(d=>d.id===id));
        if(main&&sides.every(Boolean)) rebuilt[day]={main,sides};
      }
      schedule[`${y}-${m}`]=rebuilt;
      currentYear=y;currentMonth=m;renderCalendar();
      alert(`${y}年${m+1}月の献立を読み込みました！`);
    }catch{alert('読み込みに失敗しました。');}
  };
  reader.readAsText(file);event.target.value='';
}
function printMonth(){
  const sch=getSchedule(currentYear,currentMonth);
  const ing=persons<=4?'ing4':'ing7';
  const days=getDaysInMonth(currentYear,currentMonth),first=getFirstDay(currentYear,currentMonth);
  let rows='';
  for(let d=1;d<=days;d++){
    const m=sch[d];if(!m) continue;
    const dow=['日','月','火','水','木','金','土'][(first+d-1)%7];
    rows+=`<tr><td>${d}日（${dow}）</td><td>[${m.main.genre}] ${m.main.name}</td><td style="font-size:11px;color:#555">${m.main[ing]}</td><td>[${m.sides[0].genre}] ${m.sides[0].name}</td><td>[${m.sides[1].genre}] ${m.sides[1].name}</td></tr>`;
  }
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>${currentYear}年${currentMonth+1}月 賄い献立</title><style>body{font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;padding:20px;font-size:13px}h1{font-size:18px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#666;margin-bottom:16px}table{width:100%;border-collapse:collapse}th,td{padding:7px 8px;border:1px solid #ccc;text-align:left}th{background:#f0f0f0;font-weight:700;font-size:12px}tr:nth-child(even){background:#fafafa}@media print{button{display:none}}</style></head><body><h1>${currentYear}年${currentMonth+1}月 賄い献立</h1><div class="sub">${persons}人分目安 ／ 和・洋・中ミックス</div><button onclick="window.print()" style="margin-bottom:16px;padding:6px 16px;cursor:pointer;font-size:13px">印刷する</button><table><thead><tr><th style="width:80px">日付</th><th style="width:130px">主菜</th><th>材料目安</th><th style="width:130px">副菜1</th><th style="width:130px">副菜2</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
  win.document.close();
}
renderCalendar();
</script>
