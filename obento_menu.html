<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お弁当献立プランナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#faf9f5;color:#1a1a1a;min-height:100vh}
header{background:#2d4a2d;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:700;letter-spacing:0.06em}
header p{font-size:11px;color:#a8c5a8;margin-top:2px}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e8e8e0;position:sticky;top:52px;z-index:99;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:11px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;color:#888;-webkit-tap-highlight-color:transparent}
.tab.active{color:#2d4a2d;border-bottom-color:#2d4a2d}
.tab-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}
.container{max-width:700px;margin:0 auto;padding:14px 12px 80px}
.page{display:none}
.page.active{display:block}
.search-box{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:#fff;margin-bottom:12px;outline:none}
.search-box:focus{border-color:#2d4a2d}
.menu-list{display:flex;flex-direction:column;gap:8px}
.menu-card{background:#fff;border:1px solid #eee;border-radius:12px;overflow:hidden}
.menu-card.selected{border-color:#2d4a2d}
.card-header{display:flex;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:11px 12px}
.card-color-bar{width:4px;height:40px;border-radius:2px;margin-right:10px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;color:#1a1a1a;line-height:1.3}
.card-kcal{font-size:11px;font-weight:600;color:#c0392b;margin-top:2px}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;margin-left:8px}
.select-btn{font-size:11px;padding:4px 10px;border-radius:16px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;white-space:nowrap}
.select-btn.on{background:#2d4a2d;border-color:#2d4a2d;color:#fff}
.acc-arrow{font-size:10px;color:#2d4a2d}
.accordion-body{display:none;padding:0 12px 12px 26px;border-top:1px solid #f0f0f0}
.accordion-body.open{display:block}
.acc-section{font-size:10px;font-weight:700;letter-spacing:0.08em;color:#aaa;margin:10px 0 5px}
.acc-ing{font-size:12px;color:#555;line-height:2}
.acc-step{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.snum{min-width:20px;height:20px;background:#2d4a2d;color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.stxt{font-size:12px;color:#444;line-height:1.7}
.add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:12px 14px;background:#fff;border:1px dashed #a8c5a8;border-radius:12px;color:#2d4a2d;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px}
.my-form{display:none;background:#f0f8f0;border:1px solid #c5ddc5;border-radius:12px;padding:14px;margin-bottom:12px}
.my-form label{font-size:11px;font-weight:700;color:#2d4a2d;display:block;margin-bottom:4px;margin-top:10px}
.my-form label:first-of-type{margin-top:0}
.my-form input,.my-form textarea{width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff}
.my-form textarea{resize:vertical;min-height:70px;line-height:1.6}
.my-form-hint{font-size:10px;color:#888;margin-top:3px}
.my-form-btns{display:flex;gap:8px;margin-top:12px}
.my-form-btns button{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-save-green{background:#2d4a2d;color:#fff;border:none}
.btn-cancel-gray{background:#fff;color:#888;border:1px solid #ddd}
.plan-section{background:#fff;border:1px solid #eee;border-radius:14px;padding:14px;margin-bottom:12px}
.plan-label{font-size:10px;font-weight:700;letter-spacing:0.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.plan-dot{display:inline-block;width:10px;height:10px;border-radius:50%}
.plan-dish{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:6px 0}
.plan-dish-name{font-size:14px;font-weight:600}
.plan-dish-meta{font-size:11px;color:#888;margin-top:2px}
.plan-dish-kcal{font-size:12px;font-weight:700;white-space:nowrap;color:#c0392b}
.empty-plan{font-size:13px;color:#bbb;padding:10px 0;text-align:center}
.total-box{background:#2d4a2d;color:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.total-label{font-size:12px;color:#a8c5a8;margin-bottom:4px}
.total-val{font-size:24px;font-weight:700}
.btn-clear{width:100%;padding:12px;background:#fff;border:1px solid #ddd;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:#888;margin-top:6px}
/* カレンダー */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month-label{font-size:16px;font-weight:700;color:#2d4a2d}
.cal-nav-btn{background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 14px;font-size:15px;cursor:pointer;color:#2d4a2d}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:#888;padding:4px 0}
.cal-dow:first-child{color:#e74c3c}
.cal-dow:last-child{color:#2980b9}
.cal-cell{min-height:60px;border:1px solid #eee;border-radius:8px;padding:4px 3px;cursor:pointer;background:#fff;-webkit-tap-highlight-color:transparent}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-cell.today{border-color:#2d4a2d;background:#f0f8f0}
.cal-cell.has-plan{border-color:#a8c5a8;background:#fafff8}
.cal-dnum{font-size:11px;font-weight:600;color:#333;margin-bottom:2px}
.cal-dnum.sun{color:#e74c3c}
.cal-dnum.sat{color:#2980b9}
.cal-dots{display:flex;flex-direction:column;gap:1px}
.cal-dot-text{font-size:7px;line-height:1.4;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-list-title{font-size:12px;font-weight:700;color:#2d4a2d;margin:16px 0 8px}
.cal-list-item{background:#fff;border:1px solid #eee;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.cal-list-date{font-size:12px;font-weight:700;color:#555;margin-bottom:5px}
.cal-list-dish{font-size:11px;line-height:1.8}
/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:none;align-items:flex-end}
.modal-bg.show{display:flex}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:0 16px 40px}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 14px}
.modal-title{font-size:15px;font-weight:700;color:#2d4a2d;margin-bottom:14px}
.modal-sec{font-size:11px;font-weight:700;color:#888;letter-spacing:0.08em;margin:12px 0 5px}
.modal-sel{width:100%;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.mbtn-save{background:#2d4a2d;color:#fff}
.mbtn-clear{background:#fff;color:#c0392b;border:1px solid #f0b0b0 !important}
@media(max-width:380px){.card-name{font-size:13px}.tab{padding:10px 9px;font-size:11px}}
</style>
</head>
<body>
<header>
  <h1>お弁当献立プランナー</h1>
  <p>主菜1品＋副菜3品 ＋ カレンダー管理</p>
</header>
<div class="tab-bar">
  <div class="tab active" onclick="showPage('plan')">献立</div>
  <div class="tab" onclick="showPage('calendar')"><span class="tab-dot" style="background:#8e44ad"></span>カレンダー</div>
  <div class="tab" onclick="showPage('main')"><span class="tab-dot" style="background:#c0392b"></span>主菜</div>
  <div class="tab" onclick="showPage('green')"><span class="tab-dot" style="background:#27ae60"></span>緑</div>
  <div class="tab" onclick="showPage('yellow')"><span class="tab-dot" style="background:#e67e22"></span>黄</div>
  <div class="tab" onclick="showPage('white')"><span class="tab-dot" style="background:#95a5a6"></span>白</div>
  <div class="tab" onclick="showPage('red')"><span class="tab-dot" style="background:#e74c3c"></span>赤</div>
</div>
<div class="container">
  <div class="page active" id="page-plan"><div id="plan-content"></div></div>
  <div class="page" id="page-calendar"><div id="cal-content"></div></div>
  <div class="page" id="page-main">
    <button class="add-btn" onclick="openMyForm('main')"><span style="font-size:20px;line-height:1">+</span> マイレシピを追加</button>
    <div class="my-form" id="my-form-main"></div>
    <input class="search-box" type="text" placeholder="主菜を検索..." oninput="filterCards('main',this.value)">
    <div class="menu-list" id="grid-main"></div>
  </div>
  <div class="page" id="page-green">
    <button class="add-btn" onclick="openMyForm('green')"><span style="font-size:20px;line-height:1">+</span> マイレシピを追加</button>
    <div class="my-form" id="my-form-green"></div>
    <input class="search-box" type="text" placeholder="緑の副菜を検索..." oninput="filterCards('green',this.value)">
    <div class="menu-list" id="grid-green"></div>
  </div>
  <div class="page" id="page-yellow">
    <button class="add-btn" onclick="openMyForm('yellow')"><span style="font-size:20px;line-height:1">+</span> マイレシピを追加</button>
    <div class="my-form" id="my-form-yellow"></div>
    <input class="search-box" type="text" placeholder="黄色の副菜を検索..." oninput="filterCards('yellow',this.value)">
    <div class="menu-list" id="grid-yellow"></div>
  </div>
  <div class="page" id="page-white">
    <button class="add-btn" onclick="openMyForm('white')"><span style="font-size:20px;line-height:1">+</span> マイレシピを追加</button>
    <div class="my-form" id="my-form-white"></div>
    <input class="search-box" type="text" placeholder="白系の副菜を検索..." oninput="filterCards('white',this.value)">
    <div class="menu-list" id="grid-white"></div>
  </div>
  <div class="page" id="page-red">
    <button class="add-btn" onclick="openMyForm('red')"><span style="font-size:20px;line-height:1">+</span> マイレシピを追加</button>
    <div class="my-form" id="my-form-red"></div>
    <input class="search-box" type="text" placeholder="赤系の副菜を検索..." oninput="filterCards('red',this.value)">
    <div class="menu-list" id="grid-red"></div>
  </div>
</div>

<!-- カレンダーモーダル -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sec">主菜</div><select class="modal-sel" id="msel-main"></select>
    <div class="modal-sec">緑の副菜</div><select class="modal-sel" id="msel-green"></select>
    <div class="modal-sec">黄色の副菜</div><select class="modal-sel" id="msel-yellow"></select>
    <div class="modal-sec">白系の副菜</div><select class="modal-sel" id="msel-white"></select>
    <div class="modal-sec">赤系の副菜</div><select class="modal-sel" id="msel-red"></select>
    <div class="modal-btns">
      <button class="mbtn-clear" onclick="clearDay()">この日をクリア</button>
      <button class="mbtn-save" onclick="saveDay()">保存する</button>
    </div>
  </div>
</div>

var MY_KEY='obento_my_menus';
var CAL_KEY='obento_calendar';

function loadMy(){try{var s=localStorage.getItem(MY_KEY);return s?JSON.parse(s):{main:[],green:[],yellow:[],white:[],red:[]};}catch(e){return{main:[],green:[],yellow:[],white:[],red:[]};}}
function saveMy(d){try{localStorage.setItem(MY_KEY,JSON.stringify(d));}catch(e){}}
function loadCal(){try{var s=localStorage.getItem(CAL_KEY);return s?JSON.parse(s):{};}catch(e){return{};}}
function saveCal(d){try{localStorage.setItem(CAL_KEY,JSON.stringify(d));}catch(e){}}

// ===== タブ切替 =====
var PAGE_ORDER=['plan','calendar','main','green','yellow','white','red'];
function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('page-'+id).classList.add('active');
  var idx=PAGE_ORDER.indexOf(id);
  if(idx>=0)document.querySelectorAll('.tab')[idx].classList.add('active');
  if(id==='calendar')renderCal();
  if(id==='plan')renderPlan();
}

// ===== メニューカード描画 =====
function renderCards(cat,dataArr){
  var c=CAT_MAP[cat];
  var pk=PLAN_KEYS[cat];
  var myData=loadMy();
  var myList=myData[cat]||[];
  if(!dataArr)dataArr=c.data;
  var html='';
  // マイレシピ
  if(myList.length){
    html+='<div style="font-size:11px;font-weight:700;color:'+c.color+';margin-bottom:6px">MY RECIPE</div>';
    for(var m=0;m<myList.length;m++){
      var dm=myList[m];
      var selm=(window[pk]&&window[pk]._isMy&&window[pk]._myIdx===m&&window[pk]._myCat===cat);
      var imgm='';for(var a=0;a<dm.ing.length;a++)imgm+='<div>'+dm.ing[a]+'</div>';
      var stm='';for(var b=0;b<dm.steps.length;b++)stm+='<div class="acc-step"><div class="snum">'+(b+1)+'</div><div class="stxt">'+dm.steps[b]+'</div></div>';
      html+='<div class="menu-card'+(selm?' selected':'')+'" id="mycard-'+cat+'-'+m+'" style="border-left:3px solid '+c.color+'">'
        +'<div class="card-header" onclick="toggleAcc(\'myacc-'+cat+'-'+m+'\')">'
        +'<div class="card-color-bar" style="background:'+c.color+'"></div>'
        +'<div class="card-info"><div class="card-name">'+dm.name+' <span style="font-size:9px;background:'+c.color+';color:#fff;padding:1px 5px;border-radius:8px">MY</span></div>'
        +'<div class="card-kcal">'+(dm.kcal?dm.kcal+'kcal':'カロリー未設定')+'</div></div>'
        +'<div class="card-right">'
        +'<button class="select-btn'+(selm?' on':'')+'" onclick="selectMyDish(event,\''+cat+'\','+m+')">'+(selm?'選択済':'選択する')+'</button>'
        +'<span class="acc-arrow" id="arr-myacc-'+cat+'-'+m+'">詳細 ▼</span>'
        +'</div></div>'
        +'<div class="accordion-body" id="myacc-'+cat+'-'+m+'">'
        +'<div class="acc-section">材料</div><div class="acc-ing">'+imgm+'</div>'
        +'<div class="acc-section">作り方</div>'+stm
        +'<button onclick="deleteMyDish(\''+cat+'\','+m+')" style="margin-top:10px;font-size:11px;color:#c0392b;background:#fff;border:1px solid #f0b0b0;border-radius:8px;padding:5px 12px;cursor:pointer">削除</button>'
        +'</div></div>';
    }
    html+='<hr style="border:none;border-top:1px dashed #e0e0e0;margin:10px 0">';
  }
  // 通常レシピ
  for(var i=0;i<dataArr.length;i++){
    var d=dataArr[i];
    var ri=c.data.indexOf(d);
    var sel=(window[pk]===d);
    var igh='';for(var a2=0;a2<d.ing.length;a2++)igh+='<div>'+d.ing[a2]+'</div>';
    var sth='';for(var b2=0;b2<d.steps.length;b2++)sth+='<div class="acc-step"><div class="snum">'+(b2+1)+'</div><div class="stxt">'+d.steps[b2]+'</div></div>';
    html+='<div class="menu-card'+(sel?' selected':'')+'" id="card-'+cat+'-'+ri+'">'
      +'<div class="card-header" onclick="toggleAcc(\'acc-'+cat+'-'+ri+'\')">'
      +'<div class="card-color-bar" style="background:'+c.color+'"></div>'
      +'<div class="card-info"><div class="card-name">'+d.name+'</div><div class="card-kcal">'+d.kcal+'kcal</div></div>'
      +'<div class="card-right">'
      +'<button class="select-btn'+(sel?' on':'')+'" onclick="selectDish(event,\''+cat+'\','+ri+')">'+(sel?'選択済':'選択する')+'</button>'
      +'<span class="acc-arrow" id="arr-acc-'+cat+'-'+ri+'">詳細 ▼</span>'
      +'</div></div>'
      +'<div class="accordion-body" id="acc-'+cat+'-'+ri+'">'
      +'<div class="acc-section">材料（1人分）</div><div class="acc-ing">'+igh+'</div>'
      +'<div class="acc-section">作り方</div>'+sth
      +'</div></div>';
  }
  document.getElementById('grid-'+cat).innerHTML=html;
}

function toggleAcc(id){
  var body=document.getElementById(id);
  var arr=document.getElementById('arr-'+id);
  if(!body)return;
  var open=body.classList.toggle('open');
  if(arr)arr.textContent=open?'詳細 ▲':'詳細 ▼';
}

function filterCards(cat,val){
  var c=CAT_MAP[cat];
  var filtered=val?c.data.filter(function(d){return d.name.indexOf(val)>=0||d.ing.join('').indexOf(val)>=0;}):c.data;
  renderCards(cat,filtered);
}

function selectDish(e,cat,idx){
  e.stopPropagation();
  var pk=PLAN_KEYS[cat];
  var d=CAT_MAP[cat].data[idx];
  window[pk]=(window[pk]===d)?null:d;
  renderCards(cat);
}

function selectMyDish(e,cat,myIdx){
  e.stopPropagation();
  var pk=PLAN_KEYS[cat];
  var d=loadMy()[cat][myIdx];
  if(window[pk]&&window[pk]._isMy&&window[pk]._myIdx===myIdx&&window[pk]._myCat===cat){
    window[pk]=null;
  }else{
    d._isMy=true;d._myIdx=myIdx;d._myCat=cat;
    window[pk]=d;
  }
  renderCards(cat);
}

function deleteMyDish(cat,myIdx){
  if(!confirm('このレシピを削除しますか？'))return;
  var data=loadMy();
  data[cat].splice(myIdx,1);
  saveMy(data);
  var pk=PLAN_KEYS[cat];
  if(window[pk]&&window[pk]._isMy&&window[pk]._myIdx===myIdx)window[pk]=null;
  renderCards(cat);
}

var CAT_LABELS={main:'主菜',green:'緑の副菜',yellow:'黄色の副菜',white:'白系の副菜',red:'赤系の副菜'};
function openMyForm(cat){
  var f=document.getElementById('my-form-'+cat);
  var c=CAT_MAP[cat];
  f.innerHTML='<div style="font-size:13px;font-weight:700;color:'+c.color+';margin-bottom:10px">'+CAT_LABELS[cat]+'を追加</div>'
    +'<label>料理名 <span style="color:#c0392b">*</span></label>'
    +'<input type="text" id="myn-'+cat+'" placeholder="例：鶏の照り焼き">'
    +'<label>カロリー（kcal）</label>'
    +'<input type="number" id="mykcal-'+cat+'" placeholder="例：200" min="0">'
    +'<label>材料（1行に1つ）<span style="color:#c0392b">*</span></label>'
    +'<textarea id="mying-'+cat+'" placeholder="鶏もも肉80g\nしょうゆ大さじ1\nみりん大さじ1" rows="4"></textarea>'
    +'<label>作り方（1行に1手順）<span style="color:#c0392b">*</span></label>'
    +'<textarea id="mysteps-'+cat+'" placeholder="鶏肉を一口大に切る\nフライパンで焼く\nたれを絡める" rows="4"></textarea>'
    +'<div class="my-form-btns">'
    +'<button class="btn-cancel-gray" onclick="closeMyForm(\''+cat+'\')">キャンセル</button>'
    +'<button class="btn-save-green" onclick="saveMyForm(\''+cat+'\')">保存する</button>'
    +'</div>';
  f.style.display='block';
  document.getElementById('myn-'+cat).focus();
}

function closeMyForm(cat){document.getElementById('my-form-'+cat).style.display='none';}

function saveMyForm(cat){
  var name=document.getElementById('myn-'+cat).value.trim();
  var kcal=parseInt(document.getElementById('mykcal-'+cat).value)||0;
  var ing=document.getElementById('mying-'+cat).value.trim().split('\n').map(function(s){return s.trim();}).filter(function(s){return s;});
  var steps=document.getElementById('mysteps-'+cat).value.trim().split('\n').map(function(s){return s.trim();}).filter(function(s){return s;});
  if(!name){alert('料理名を入力してください');return;}
  if(!ing.length){alert('材料を入力してください');return;}
  if(!steps.length){alert('作り方を入力してください');return;}
  var data=loadMy();
  data[cat].push({name:name,kcal:kcal,ing:ing,steps:steps});
  saveMy(data);
  closeMyForm(cat);
  renderCards(cat);
}

// ===== 献立プラン =====
function renderPlan(){
  var cats=[
    {key:'planMain',label:'主菜',color:'#c0392b'},
    {key:'planGreen',label:'緑の副菜',color:'#27ae60'},
    {key:'planYellow',label:'黄色の副菜',color:'#e67e22'},
    {key:'planWhite',label:'白系の副菜',color:'#95a5a6'},
    {key:'planRed',label:'赤系の副菜',color:'#e74c3c'}
  ];
  var total=0;
  cats.forEach(function(c){if(window[c.key])total+=window[c.key].kcal||0;});
  var html='<div class="total-box"><div><div class="total-label">合計カロリー</div><div class="total-val">'+(total?total+' kcal':'-- kcal')+'</div></div>'
    +'<div style="font-size:11px;color:#a8c5a8;text-align:right">目標<br>500〜700kcal</div></div>';
  cats.forEach(function(c){
    var d=window[c.key];
    html+='<div class="plan-section"><div class="plan-label"><span class="plan-dot" style="background:'+c.color+'"></span>'+c.label+'</div>';
    if(d){
      html+='<div class="plan-dish"><div><div class="plan-dish-name">'+d.name+'</div>'
        +'<div class="plan-dish-meta">'+(d.ing?d.ing.slice(0,2).join('・')+'など':'')+'</div></div>'
        +'<div class="plan-dish-kcal">'+(d.kcal?d.kcal+'kcal':'')+'</div></div>';
    }else{
      html+='<div class="empty-plan">未選択 — '+c.label+'タブから選んでください</div>';
    }
    html+='</div>';
  });
  if(total)html+='<button class="btn-clear" onclick="clearPlan()">プランをリセット</button>';
  document.getElementById('plan-content').innerHTML=html;
}

function clearPlan(){
  window.planMain=window.planGreen=window.planYellow=window.planWhite=window.planRed=null;
  renderPlan();
}

// ===== カレンダー =====
var calY,calM;
function dkey(y,m,d){return y+'-'+(m<10?'0'+m:m)+'-'+(d<10?'0'+d:d);}

function renderCal(){
  var now=new Date();
  if(!calY){calY=now.getFullYear();calM=now.getMonth()+1;}
  var data=loadCal();
  var first=new Date(calY,calM-1,1).getDay();
  var last=new Date(calY,calM,0).getDate();
  var todayKey=dkey(now.getFullYear(),now.getMonth()+1,now.getDate());
  var KC={main:'#c0392b',green:'#27ae60',yellow:'#e67e22',white:'#95a5a6',red:'#e74c3c'};
  var KL={main:'主',green:'緑',yellow:'黄',white:'白',red:'赤'};

  var html='<div class="cal-nav-row">'
    +'<button class="cal-nav-btn" onclick="calMove(-1)">&#9664;</button>'
    +'<div class="cal-month-label">'+calY+'年 '+calM+'月</div>'
    +'<button class="cal-nav-btn" onclick="calMove(1)">&#9654;</button>'
    +'</div>'
    +'<div class="cal-grid">'
    +'<div class="cal-dow">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div>'
    +'<div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div>'
    +'<div class="cal-dow">土</div>';
  for(var i=0;i<first;i++)html+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=last;d++){
    var k=dkey(calY,calM,d);
    var dow=(first+d-1)%7;
    var plan=data[k];
    var hasPlan=plan&&(plan.main||plan.green||plan.yellow||plan.white||plan.red);
    var cls='cal-cell'+(k===todayKey?' today':'')+(hasPlan?' has-plan':'');
    var numCls='cal-dnum'+(dow===0?' sun':dow===6?' sat':'');
    html+='<div class="'+cls+'" onclick="openModal('+calY+','+calM+','+d+')">'
      +'<div class="'+numCls+'">'+d+'</div><div class="cal-dots">';
    if(plan){
      ['main','green','yellow','white','red'].forEach(function(kk){
        if(plan[kk])html+='<div class="cal-dot-text" style="color:'+KC[kk]+'">'+KL[kk]+' '+plan[kk]+'</div>';
      });
    }
    html+='</div></div>';
  }
  html+='</div>';

  // 一覧
  var listed=false;
  for(var dd=1;dd<=last;dd++){
    var dk=dkey(calY,calM,dd);
    var dp=data[dk];
    if(dp&&(dp.main||dp.green||dp.yellow||dp.white||dp.red)){
      if(!listed){html+='<div class="cal-list-title">今月の献立一覧</div>';listed=true;}
      html+='<div class="cal-list-item" onclick="openModal('+calY+','+calM+','+dd+')">'
        +'<div class="cal-list-date">'+calM+'月'+dd+'日</div>'
        +'<div class="cal-list-dish">';
      var knames={main:'主菜',green:'緑',yellow:'黄',white:'白',red:'赤'};
      ['main','green','yellow','white','red'].forEach(function(kk){
        if(dp[kk])html+='<span style="color:'+KC[kk]+';margin-right:8px">'+knames[kk]+'：'+dp[kk]+'</span>';
      });
      html+='</div></div>';
    }
  }
  document.getElementById('cal-content').innerHTML=html;
}

function calMove(dir){
  calM+=dir;
  if(calM>12){calM=1;calY++;}
  if(calM<1){calM=12;calY--;}
  renderCal();
}

var modalY,modalM,modalD;
function openModal(y,m,d){
  modalY=y;modalM=m;modalD=d;
  var k=dkey(y,m,d);
  var data=loadCal();
  var plan=data[k]||{};
  var dow=['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];
  document.getElementById('modal-title').textContent=y+'年'+m+'月'+d+'日（'+dow+'）';

  var cats=[
    {id:'msel-main',data:MAIN,cat:'main'},
    {id:'msel-green',data:SIDE_GREEN,cat:'green'},
    {id:'msel-yellow',data:SIDE_YELLOW,cat:'yellow'},
    {id:'msel-white',data:SIDE_WHITE,cat:'white'},
    {id:'msel-red',data:SIDE_RED,cat:'red'}
  ];
  cats.forEach(function(c){
    var sel=document.getElementById(c.id);
    var myData=loadMy();
    var myList=myData[c.cat]||[];
    var opts='<option value="">-- 未選択 --</option>';
    if(myList.length){
      opts+='<optgroup label="マイレシピ">';
      myList.forEach(function(d){opts+='<option value="'+d.name+'"'+(plan[c.cat]===d.name?' selected':'')+'>'+d.name+'</option>';});
      opts+='</optgroup>';
    }
    opts+='<optgroup label="レシピ一覧">';
    c.data.forEach(function(d){opts+='<option value="'+d.name+'"'+(plan[c.cat]===d.name?' selected':'')+'>'+d.name+'</option>';});
    opts+='</optgroup>';
    sel.innerHTML=opts;
  });
  document.getElementById('modal-bg').classList.add('show');
}

function closeModal(){document.getElementById('modal-bg').classList.remove('show');}

function saveDay(){
  var k=dkey(modalY,modalM,modalD);
  var data=loadCal();
  var plan={
    main:document.getElementById('msel-main').value,
    green:document.getElementById('msel-green').value,
    yellow:document.getElementById('msel-yellow').value,
    white:document.getElementById('msel-white').value,
    red:document.getElementById('msel-red').value
  };
  var hasAny=plan.main||plan.green||plan.yellow||plan.white||plan.red;
  if(hasAny){data[k]=plan;}else{delete data[k];}
  saveCal(data);
  closeModal();
  renderCal();
}

function clearDay(){
  var k=dkey(modalY,modalM,modalD);
  var data=loadCal();
  delete data[k];
  saveCal(data);
  closeModal();
  renderCal();
}

// ===== 初期化 =====
renderCards('main');renderCards('green');renderCards('yellow');renderCards('white');renderCards('red');
renderPlan();
</script>
