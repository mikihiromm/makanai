<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お弁当献立プランナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#faf9f5;color:#1a1a1a;min-height:100vh}
header{background:#2d4a2d;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:700;letter-spacing:0.06em}
header p{font-size:11px;color:#a8c5a8;margin-top:2px}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e8e8e0;position:sticky;top:52px;z-index:99;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;color:#888;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.tab.active{color:#2d4a2d;border-bottom-color:#2d4a2d}
.tab-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.container{max-width:700px;margin:0 auto;padding:16px 14px 80px}
.page{display:none}
.page.active{display:block}
.section-title{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#888;margin-bottom:10px;margin-top:20px}
.search-box{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:#fff;margin-bottom:14px;outline:none}
.search-box:focus{border-color:#2d4a2d}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.menu-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;position:relative}
.menu-card:active{transform:scale(0.97)}
.menu-card.selected{border-color:#2d4a2d;background:#f0f5f0}
.menu-card .check{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:#2d4a2d;display:none;align-items:center;justify-content:center}
.menu-card.selected .check{display:flex}
.check-mark{color:#fff;font-size:11px;font-weight:700}
.card-color{width:100%;height:4px;border-radius:2px;margin-bottom:8px}
.card-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:4px;line-height:1.3}
.card-meta{font-size:10px;color:#888;line-height:1.6}
.card-kcal{font-size:11px;font-weight:600;color:#c0392b;margin-top:3px}
.detail-btn{font-size:10px;color:#2d4a2d;margin-top:4px;cursor:pointer;display:inline-block}
.drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,0.12);z-index:200;padding:0 16px 30px;transform:translateY(100%);transition:transform 0.3s ease;max-height:85vh;overflow-y:auto}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 16px}
.drawer-title{font-size:16px;font-weight:700;margin-bottom:4px}
.drawer-sub{font-size:11px;color:#888;margin-bottom:14px}
.drawer-section{font-size:11px;font-weight:700;letter-spacing:0.08em;color:#888;margin:12px 0 6px}
.drawer-body{font-size:13px;color:#444;line-height:1.8}
.drawer-steps{font-size:13px;color:#444;line-height:1.9}
.drawer-step{display:flex;gap:8px;margin-bottom:6px}
.step-num{min-width:20px;height:20px;background:#2d4a2d;color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px}
.drawer-close{position:absolute;top:14px;right:16px;font-size:20px;cursor:pointer;color:#aaa;line-height:1}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:199;display:none}
.overlay.show{display:block}
/* プランページ */
.plan-section{background:#fff;border:1px solid #eee;border-radius:14px;padding:14px;margin-bottom:14px}
.plan-label{font-size:10px;font-weight:700;letter-spacing:0.08em;margin-bottom:8px}
.plan-main-label{color:#c0392b}
.plan-green-label{color:#27ae60}
.plan-yellow-label{color:#e67e22}
.plan-white-label{color:#7f8c8d}
.plan-red-label{color:#e74c3c}
.plan-dish{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5}
.plan-dish:last-child{border-bottom:none}
.plan-dish-name{font-size:14px;font-weight:600;color:#1a1a1a}
.plan-dish-meta{font-size:11px;color:#888;margin-top:2px}
.plan-dish-kcal{font-size:12px;color:#c0392b;font-weight:600;white-space:nowrap}
.empty-plan{font-size:13px;color:#bbb;padding:12px 0;text-align:center}
.total-kcal-box{background:#2d4a2d;color:#fff;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.total-label{font-size:12px;color:#a8c5a8}
.total-val{font-size:22px;font-weight:700}
.btn-clear{width:100%;padding:12px;background:#fff;border:1px solid #ddd;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:#888;margin-top:8px}
.badge-color{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px;vertical-align:middle}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-btn{padding:5px 12px;border-radius:16px;border:1px solid #ddd;font-size:12px;cursor:pointer;background:#fff;color:#666;-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:#2d4a2d;border-color:#2d4a2d;color:#fff}
@media(max-width:380px){.menu-grid{grid-template-columns:1fr}.tab{padding:10px 12px;font-size:12px}}
</style>
</head>
<body>

<header>
  <h1>お弁当献立プランナー</h1>
  <p>主菜1品＋副菜3品をセレクト</p>
</header>

<div class="tab-bar">
  <div class="tab active" onclick="showPage('plan')">献立プラン</div>
  <div class="tab" onclick="showPage('main')"><span class="tab-dot" style="background:#c0392b"></span>主菜 60品</div>
  <div class="tab" onclick="showPage('green')"><span class="tab-dot" style="background:#27ae60"></span>緑 20品</div>
  <div class="tab" onclick="showPage('yellow')"><span class="tab-dot" style="background:#e67e22"></span>黄 20品</div>
  <div class="tab" onclick="showPage('white')"><span class="tab-dot" style="background:#95a5a6"></span>白 20品</div>
  <div class="tab" onclick="showPage('red')"><span class="tab-dot" style="background:#e74c3c"></span>赤 20品</div>
</div>

<div class="container">

<!-- 献立プランページ -->
<div class="page active" id="page-plan">
  <div id="plan-content"></div>
</div>

<!-- 主菜ページ -->
<div class="page" id="page-main">
  <input class="search-box" type="text" placeholder="主菜を検索..." oninput="filterCards('main',this.value)">
  <div class="menu-grid" id="grid-main"></div>
</div>

<!-- 緑副菜ページ -->
<div class="page" id="page-green">
  <input class="search-box" type="text" placeholder="緑の副菜を検索..." oninput="filterCards('green',this.value)">
  <div class="menu-grid" id="grid-green"></div>
</div>

<!-- 黄副菜ページ -->
<div class="page" id="page-yellow">
  <input class="search-box" type="text" placeholder="黄色の副菜を検索..." oninput="filterCards('yellow',this.value)">
  <div class="menu-grid" id="grid-yellow"></div>
</div>

<!-- 白副菜ページ -->
<div class="page" id="page-white">
  <input class="search-box" type="text" placeholder="白系の副菜を検索..." oninput="filterCards('white',this.value)">
  <div class="menu-grid" id="grid-white"></div>
</div>

<!-- 赤副菜ページ -->
<div class="page" id="page-red">
  <input class="search-box" type="text" placeholder="赤系の副菜を検索..." oninput="filterCards('red',this.value)">
  <div class="menu-grid" id="grid-red"></div>
</div>

</div><!-- /container -->

<!-- 詳細ドロワー -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <span class="drawer-close" onclick="closeDrawer()">×</span>
  <div id="drawer-content"></div>
</div>

  {name:"サーモンのマリネ",kcal:100,ing:"スモークサーモン40g・玉ねぎ・ケイパー・レモン",steps:["玉ねぎを薄切りにする","サーモンと盛り付ける","ケイパー・レモンを添える"]},
  {name:"イクラのしょうゆ漬け風",kcal:60,ing:"明太子30g・しょうゆ・みりん",steps:["明太子をほぐす","しょうゆ・みりんで和える","冷蔵庫で味をなじませる"]},
  {name:"えびの塩炒め",kcal:80,ing:"えび50g・塩・ごま油・にんにく",steps:["えびの背わたを取る","ごま油・にんにくで炒める","塩で整える"]},
  {name:"赤いんげんのトマト煮",kcal:70,ing:"金時豆40g・トマト缶・塩・オリーブ油",steps:["トマト缶を鍋に入れる","金時豆を加えて煮る","塩・オリーブ油で整える"]},
  {name:"クコの実入り甘酢れんこん",kcal:55,ing:"れんこん50g・クコの実・酢・砂糖・塩",steps:["れんこんを薄切りにして茹でる","酢・砂糖・塩で和える","クコの実を加える"]},
];

// ==================== 状態 ====================
let planMain = null;
let planGreen = null;
let planYellow = null;
let planWhite = null;
let planRed = null;

// ==================== UI ====================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const tabs = document.querySelectorAll('.tab');
  const map = {plan:0, main:1, green:2, yellow:3, white:4, red:5};
  tabs[map[id]].classList.add('active');
  if (id === 'plan') renderPlan();
}

function renderCards(cat, data, color, planKey) {
  const grid = document.getElementById('grid-' + cat);
  grid.innerHTML = data.map((d, i) => {
    const sel = window['plan'+planKey[0].toUpperCase()+planKey.slice(1)] === d;
    return `<div class="menu-card${sel?' selected':''}" id="card-${cat}-${i}" onclick="selectDish('${cat}','${planKey}',${i})">
      <div class="check"><span class="check-mark">✓</span></div>
      <div class="card-color" style="background:${color}"></div>
      <div class="card-name">${d.name}</div>
      <div class="card-kcal">${d.kcal}kcal</div>
      <div class="card-meta">${d.ing.split('・')[0]}など</div>
      <span class="detail-btn" onclick="showDetail(event,${JSON.stringify(cat)},${i})">詳細を見る ▼</span>
    </div>`;
  }).join('');
}

function filterCards(cat, val) {
  const map = {main:[MAIN,'#c0392b','main'], green:[SIDE_GREEN,'#27ae60','green'], yellow:[SIDE_YELLOW,'#e67e22','yellow'], white:[SIDE_WHITE,'#95a5a6','white'], red:[SIDE_RED,'#e74c3c','red']};
  const [data, color, key] = map[cat];
  const grid = document.getElementById('grid-' + cat);
  const filtered = data.filter(d => d.name.includes(val) || d.ing.includes(val));
  grid.innerHTML = filtered.map(d => {
    const i = data.indexOf(d);
    const planKey = key;
    const planVar = window['plan'+planKey[0].toUpperCase()+planKey.slice(1)];
    const sel = planVar === d;
    return `<div class="menu-card${sel?' selected':''}" id="card-${cat}-${i}" onclick="selectDish('${cat}','${planKey}',${i})">
      <div class="check"><span class="check-mark">✓</span></div>
      <div class="card-color" style="background:${color}"></div>
      <div class="card-name">${d.name}</div>
      <div class="card-kcal">${d.kcal}kcal</div>
      <div class="card-meta">${d.ing.split('・')[0]}など</div>
      <span class="detail-btn" onclick="showDetail(event,'${cat}',${i})">詳細を見る ▼</span>
    </div>`;
  }).join('');
}

function selectDish(cat, planKey, idx) {
  const map = {main: MAIN, green: SIDE_GREEN, yellow: SIDE_YELLOW, white: SIDE_WHITE, red: SIDE_RED};
  const data = map[cat];
  const key = 'plan' + planKey[0].toUpperCase() + planKey.slice(1);
  if (window[key] === data[idx]) {
    window[key] = null;
  } else {
    window[key] = data[idx];
  }
  const color = {main:'#c0392b', green:'#27ae60', yellow:'#e67e22', white:'#95a5a6', red:'#e74c3c'}[cat];
  renderCards(cat, data, color, planKey);
}

function showDetail(e, cat, idx) {
  e.stopPropagation();
  const map = {main: MAIN, green: SIDE_GREEN, yellow: SIDE_YELLOW, white: SIDE_WHITE, red: SIDE_RED};
  const d = map[cat][idx];
  const color = {main:'#c0392b', green:'#27ae60', yellow:'#e67e22', white:'#95a5a6', red:'#e74c3c'}[cat];
  const label = {main:'主菜', green:'緑の副菜', yellow:'黄色の副菜', white:'白系の副菜', red:'赤系の副菜'}[cat];
  document.getElementById('drawer-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color}"></span>
      <span style="font-size:11px;color:#888">${label}</span>
    </div>
    <div class="drawer-title">${d.name}</div>
    <div class="drawer-sub">${d.kcal}kcal / 1人前</div>
    <div class="drawer-section">材料（1人分）</div>
    <div class="drawer-body">${d.ing.replace(/・/g,'<br>')}</div>
    <div class="drawer-section">作り方</div>
    <div class="drawer-steps">${d.steps.map((s,i)=>`<div class="drawer-step"><div class="step-num">${i+1}</div><div>${s}</div></div>`).join('')}</div>
  `;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function renderPlan() {
  const dishes = [
    {key:'planMain', label:'主菜', color:'#c0392b', labelClass:'plan-main-label'},
    {key:'planGreen', label:'緑の副菜', color:'#27ae60', labelClass:'plan-green-label'},
    {key:'planYellow', label:'黄色の副菜', color:'#e67e22', labelClass:'plan-yellow-label'},
    {key:'planWhite', label:'白系の副菜', color:'#95a5a6', labelClass:'plan-white-label'},
    {key:'planRed', label:'赤系の副菜', color:'#e74c3c', labelClass:'plan-red-label'},
  ];
  let totalKcal = 0;
  let hasAny = false;
  dishes.forEach(d => { if(window[d.key]) { totalKcal += window[d.key].kcal; hasAny = true; } });

  let html = `<div class="total-kcal-box">
    <div><div class="total-label">合計カロリー（主菜＋副菜）</div><div class="total-val">${hasAny ? totalKcal + ' kcal' : '-- kcal'}</div></div>
    <div style="font-size:11px;color:#a8c5a8;text-align:right">目標<br>500〜700kcal</div>
  </div>`;

  dishes.forEach(d => {
    const dish = window[d.key];
    html += `<div class="plan-section">
      <div class="plan-label ${d.labelClass}"><span class="badge-color" style="background:${d.color}"></span>${d.label}</div>`;
    if (dish) {
      html += `<div class="plan-dish">
        <div>
          <div class="plan-dish-name">${dish.name}</div>
          <div class="plan-dish-meta">${dish.ing.split('・').slice(0,2).join('・')}など</div>
        </div>
        <div class="plan-dish-kcal">${dish.kcal}kcal</div>
      </div>`;
    } else {
      html += `<div class="empty-plan">未選択 — ${d.label}タブから選んでください</div>`;
    }
    html += `</div>`;
  });

  if (hasAny) {
    html += `<button class="btn-clear" onclick="clearPlan()">プランをリセット</button>`;
  }
  document.getElementById('plan-content').innerHTML = html;
}

function clearPlan() {
  planMain = planGreen = planYellow = planWhite = planRed = null;
  window.planMain = window.planGreen = window.planYellow = window.planWhite = window.planRed = null;
  renderPlan();
}

// 初期化
window.planMain = null; window.planGreen = null; window.planYellow = null; window.planWhite = null; window.planRed = null;
renderCards('main', MAIN, '#c0392b', 'main');
renderCards('green', SIDE_GREEN, '#27ae60', 'green');
renderCards('yellow', SIDE_YELLOW, '#e67e22', 'yellow');
renderCards('white', SIDE_WHITE, '#95a5a6', 'white');
renderCards('red', SIDE_RED, '#e74c3c', 'red');
renderPlan();
</script>
</body>
