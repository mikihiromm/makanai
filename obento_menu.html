<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お弁当献立プランナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#faf9f5;color:#1a1a1a;min-height:100vh}
header{background:#2d4a2d;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:700;letter-spacing:0.06em}
header p{font-size:11px;color:#a8c5a8;margin-top:2px}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e8e8e0;position:sticky;top:52px;z-index:99;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:12px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;color:#888;-webkit-tap-highlight-color:transparent}
.tab.active{color:#2d4a2d;border-bottom-color:#2d4a2d}
.tab-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.container{max-width:700px;margin:0 auto;padding:16px 14px 80px}
.page{display:none}
.page.active{display:block}
.search-box{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:#fff;margin-bottom:14px;outline:none}
.search-box:focus{border-color:#2d4a2d}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.menu-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative}
.menu-card.selected{border-color:#2d4a2d;background:#f0f5f0}
.card-check{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:#2d4a2d;display:none;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.menu-card.selected .card-check{display:flex}
.card-color{width:100%;height:4px;border-radius:2px;margin-bottom:8px}
.card-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:4px;line-height:1.3}
.card-kcal{font-size:11px;font-weight:600;color:#c0392b;margin-top:3px}
.card-meta{font-size:10px;color:#888;margin-top:2px}
.detail-btn{display:inline-block;font-size:10px;color:#2d4a2d;margin-top:6px;cursor:pointer;border-bottom:1px solid #c5ddc5}
.drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,0.12);z-index:200;padding:0 16px 40px;transform:translateY(100%);transition:transform 0.3s ease;max-height:85vh;overflow-y:auto}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 16px}
.drawer-close{position:absolute;top:14px;right:16px;font-size:22px;cursor:pointer;color:#aaa}
.drawer-title{font-size:17px;font-weight:700;margin-bottom:4px}
.drawer-sub{font-size:11px;color:#888;margin-bottom:14px}
.drawer-section{font-size:11px;font-weight:700;letter-spacing:0.08em;color:#888;margin:14px 0 6px}
.drawer-ing{font-size:13px;color:#444;line-height:2}
.drawer-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.step-num{min-width:22px;height:22px;background:#2d4a2d;color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:#444;line-height:1.7}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:199;display:none}
.overlay.show{display:block}
.plan-section{background:#fff;border:1px solid #eee;border-radius:14px;padding:14px;margin-bottom:12px}
.plan-label{font-size:10px;font-weight:700;letter-spacing:0.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.plan-dish{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:8px 0}
.plan-dish-name{font-size:14px;font-weight:600}
.plan-dish-meta{font-size:11px;color:#888;margin-top:2px}
.plan-dish-kcal{font-size:12px;font-weight:700;white-space:nowrap;color:#c0392b}
.empty-plan{font-size:13px;color:#bbb;padding:10px 0;text-align:center}
.total-box{background:#2d4a2d;color:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.total-label{font-size:12px;color:#a8c5a8;margin-bottom:4px}
.total-val{font-size:24px;font-weight:700}
.btn-clear{width:100%;padding:12px;background:#fff;border:1px solid #ddd;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:#888;margin-top:6px}
@media(max-width:380px){.menu-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>お弁当献立プランナー</h1>
  <p>主菜1品＋副菜3品をセレクト</p>
</header>
<div class="tab-bar">
  <div class="tab active" onclick="showPage('plan')">献立プラン</div>
  <div class="tab" onclick="showPage('main')"><span class="tab-dot" style="background:#c0392b"></span>主菜</div>
  <div class="tab" onclick="showPage('green')"><span class="tab-dot" style="background:#27ae60"></span>緑</div>
  <div class="tab" onclick="showPage('yellow')"><span class="tab-dot" style="background:#e67e22"></span>黄</div>
  <div class="tab" onclick="showPage('white')"><span class="tab-dot" style="background:#95a5a6"></span>白</div>
  <div class="tab" onclick="showPage('red')"><span class="tab-dot" style="background:#e74c3c"></span>赤</div>
</div>
<div class="container">
  <div class="page active" id="page-plan"><div id="plan-content"></div></div>
  <div class="page" id="page-main"><input class="search-box" type="text" placeholder="主菜を検索..." oninput="filterCards('main',this.value)"><div class="menu-grid" id="grid-main"></div></div>
  <div class="page" id="page-green"><input class="search-box" type="text" placeholder="緑の副菜を検索..." oninput="filterCards('green',this.value)"><div class="menu-grid" id="grid-green"></div></div>
  <div class="page" id="page-yellow"><input class="search-box" type="text" placeholder="黄色の副菜を検索..." oninput="filterCards('yellow',this.value)"><div class="menu-grid" id="grid-yellow"></div></div>
  <div class="page" id="page-white"><input class="search-box" type="text" placeholder="白系の副菜を検索..." oninput="filterCards('white',this.value)"><div class="menu-grid" id="grid-white"></div></div>
  <div class="page" id="page-red"><input class="search-box" type="text" placeholder="赤系の副菜を検索..." oninput="filterCards('red',this.value)"><div class="menu-grid" id="grid-red"></div></div>
</div>
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <span class="drawer-close" onclick="closeDrawer()">×</span>
  <div id="drawer-content"></div>
</div>

{name:"にんじんのクミン炒め",kcal:55,ing:["にんじん50g","クミンシード小さじ1/2","オリーブ油小さじ1","塩少々"],steps:["にんじんを千切りにする","クミンとオリーブ油で炒める","塩で整える"]},
{name:"トマトの卵炒め",kcal:90,ing:["トマト50g","卵1個","塩こしょう少々","ごま油小さじ1"],steps:["卵を溶く","ごま油でトマトを炒める","卵を加えてふんわり仕上げる"]},
{name:"赤パプリカのナムル",kcal:35,ing:["赤パプリカ50g","ごま油小さじ1","塩少々","にんにく少々"],steps:["パプリカを細切りにして茹でる","水気を切る","ごま油と塩とにんにくで和える"]},
{name:"にんじんしりしり",kcal:70,ing:["にんじん50g","卵1個","ツナ20g","しょうゆ小さじ1"],steps:["にんじんを千切りにしてごま油で炒める","ツナを加える","卵としょうゆで仕上げる"]},
{name:"サーモンのマリネ",kcal:100,ing:["スモークサーモン40g","玉ねぎ20g","ケイパー少々","レモン適量"],steps:["玉ねぎを薄切りにする","サーモンと盛り付ける","ケイパーとレモンを添える"]},
{name:"明太子和え",kcal:60,ing:["明太子30g","しょうゆ少々","みりん少々"],steps:["明太子をほぐす","しょうゆとみりんで和える","冷蔵庫で味をなじませる"]},
{name:"えびの塩炒め",kcal:80,ing:["えび50g","塩少々","ごま油小さじ1","にんにく少々"],steps:["えびの背わたを取る","ごま油とにんにくで炒める","塩で整える"]},
{name:"金時豆のトマト煮",kcal:70,ing:["金時豆40g","トマト缶50g","塩少々","オリーブ油小さじ1"],steps:["トマト缶を鍋に入れる","金時豆を加えて煮る","塩とオリーブ油で整える"]},
{name:"甘酢れんこん",kcal:55,ing:["れんこん50g","酢大さじ1","砂糖大さじ1","クコの実適量"],steps:["れんこんを薄切りにして茹でる","酢と砂糖と塩で和える","クコの実を加える"]}

<script>
var CAT_MAP={
  main:{data:MAIN,color:"#c0392b",label:"主菜",planKey:"planMain"},
  green:{data:SIDE_GREEN,color:"#27ae60",label:"緑の副菜",planKey:"planGreen"},
  yellow:{data:SIDE_YELLOW,color:"#e67e22",label:"黄色の副菜",planKey:"planYellow"},
  white:{data:SIDE_WHITE,color:"#95a5a6",label:"白系の副菜",planKey:"planWhite"},
  red:{data:SIDE_RED,color:"#e74c3c",label:"赤系の副菜",planKey:"planRed"}
};
window.planMain=null;window.planGreen=null;window.planYellow=null;window.planWhite=null;window.planRed=null;

function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('page-'+id).classList.add('active');
  var order=['plan','main','green','yellow','white','red'];
  document.querySelectorAll('.tab')[order.indexOf(id)].classList.add('active');
  if(id==='plan')renderPlan();
}

function renderCards(cat,dataArr){
  var c=CAT_MAP[cat];
  if(!dataArr)dataArr=c.data;
  var html='';
  for(var i=0;i<dataArr.length;i++){
    var d=dataArr[i];
    var realIdx=c.data.indexOf(d);
    var sel=(window[c.planKey]===d);
    html+='<div class="menu-card'+(sel?' selected':'')+'" onclick="selectDish(\''+cat+'\','+realIdx+')">'
      +'<div class="card-check">&#10003;</div>'
      +'<div class="card-color" style="background:'+c.color+'"></div>'
      +'<div class="card-name">'+d.name+'</div>'
      +'<div class="card-kcal">'+d.kcal+'kcal</div>'
      +'<div class="card-meta">'+d.ing[0]+'など</div>'
      +'<span class="detail-btn" onclick="showDetail(event,\''+cat+'\','+realIdx+')">詳細を見る &#9660;</span>'
      +'</div>';
  }
  document.getElementById('grid-'+cat).innerHTML=html;
}

function filterCards(cat,val){
  var c=CAT_MAP[cat];
  var filtered=val?c.data.filter(function(d){return d.name.indexOf(val)>=0||d.ing.join('').indexOf(val)>=0;}):c.data;
  renderCards(cat,filtered);
}

function selectDish(cat,idx){
  var c=CAT_MAP[cat];
  var d=c.data[idx];
  window[c.planKey]=(window[c.planKey]===d)?null:d;
  renderCards(cat,c.data);
}

function showDetail(e,cat,idx){
  e.stopPropagation();
  var c=CAT_MAP[cat];
  var d=c.data[idx];
  var ingHtml='';
  for(var i=0;i<d.ing.length;i++)ingHtml+='<div>'+d.ing[i]+'</div>';
  var stepsHtml='';
  for(var j=0;j<d.steps.length;j++){
    stepsHtml+='<div class="drawer-step"><div class="step-num">'+(j+1)+'</div><div class="step-text">'+d.steps[j]+'</div></div>';
  }
  document.getElementById('drawer-content').innerHTML=
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
    +'<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+c.color+'"></span>'
    +'<span style="font-size:11px;color:#888">'+c.label+'</span></div>'
    +'<div class="drawer-title">'+d.name+'</div>'
    +'<div class="drawer-sub">'+d.kcal+'kcal / 1人前</div>'
    +'<div class="drawer-section">材料（1人分）</div>'
    +'<div class="drawer-ing">'+ingHtml+'</div>'
    +'<div class="drawer-section">作り方</div>'
    +stepsHtml;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function renderPlan(){
  var cats=[
    {key:'planMain',label:'主菜',color:'#c0392b'},
    {key:'planGreen',label:'緑の副菜',color:'#27ae60'},
    {key:'planYellow',label:'黄色の副菜',color:'#e67e22'},
    {key:'planWhite',label:'白系の副菜',color:'#95a5a6'},
    {key:'planRed',label:'赤系の副菜',color:'#e74c3c'}
  ];
  var total=0;
  for(var i=0;i<cats.length;i++){if(window[cats[i].key])total+=window[cats[i].key].kcal;}
  var html='<div class="total-box">'
    +'<div><div class="total-label">合計カロリー（主菜＋副菜）</div>'
    +'<div class="total-val">'+(total?total+' kcal':'-- kcal')+'</div></div>'
    +'<div style="font-size:11px;color:#a8c5a8;text-align:right">目標<br>500〜700kcal</div>'
    +'</div>';
  for(var j=0;j<cats.length;j++){
    var c=cats[j];
    var d=window[c.key];
    html+='<div class="plan-section">'
      +'<div class="plan-label"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+c.color+'"></span>'+c.label+'</div>';
    if(d){
      html+='<div class="plan-dish">'
        +'<div><div class="plan-dish-name">'+d.name+'</div>'
        +'<div class="plan-dish-meta">'+d.ing.slice(0,2).join('・')+'など</div></div>'
        +'<div class="plan-dish-kcal">'+d.kcal+'kcal</div></div>';
    }else{
      html+='<div class="empty-plan">未選択 — '+c.label+'タブから選んでください</div>';
    }
    html+='</div>';
  }
  if(total)html+='<button class="btn-clear" onclick="clearPlan()">プランをリセット</button>';
  document.getElementById('plan-content').innerHTML=html;
}

function clearPlan(){
  window.planMain=window.planGreen=window.planYellow=window.planWhite=window.planRed=null;
  renderPlan();
}

renderCards('main');renderCards('green');renderCards('yellow');renderCards('white');renderCards('red');
renderPlan();
</script>
</body>
</html>
