<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お弁当献立プランナー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#faf9f5;color:#1a1a1a;min-height:100vh}
header{background:#2d4a2d;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:700;letter-spacing:0.06em}
header p{font-size:11px;color:#a8c5a8;margin-top:2px}
.tab-bar{display:flex;background:#fff;border-bottom:2px solid #e8e8e0;position:sticky;top:52px;z-index:99;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab{padding:11px 13px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;color:#888;-webkit-tap-highlight-color:transparent}
.tab.active{color:#2d4a2d;border-bottom-color:#2d4a2d}
.tab-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.container{max-width:700px;margin:0 auto;padding:14px 12px 80px}
.page{display:none}
.page.active{display:block}
.search-box{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:#fff;margin-bottom:12px;outline:none}
.search-box:focus{border-color:#2d4a2d}
.menu-list{display:flex;flex-direction:column;gap:8px}
.menu-card{background:#fff;border:1px solid #eee;border-radius:12px;overflow:hidden}
.menu-card.selected{border-color:#2d4a2d}
.card-header{display:flex;align-items:center;gap:0;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:11px 12px}
.card-color-bar{width:4px;height:40px;border-radius:2px;margin-right:10px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;color:#1a1a1a;line-height:1.3}
.card-kcal{font-size:11px;font-weight:600;color:#c0392b;margin-top:2px}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:8px}
.select-btn{font-size:11px;padding:4px 10px;border-radius:16px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.select-btn.on{background:#2d4a2d;border-color:#2d4a2d;color:#fff}
.toggle-btn{font-size:10px;color:#2d4a2d;cursor:pointer;white-space:nowrap;text-decoration:none;border:none;background:none;padding:0}
.accordion-body{display:none;padding:0 12px 12px 26px;border-top:1px solid #f0f0f0}
.accordion-body.open{display:block}
.acc-section{font-size:10px;font-weight:700;letter-spacing:0.08em;color:#aaa;margin:10px 0 5px}
.acc-ing{font-size:12px;color:#555;line-height:2}
.acc-step{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.snum{min-width:20px;height:20px;background:#2d4a2d;color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.stxt{font-size:12px;color:#444;line-height:1.7}
.plan-section{background:#fff;border:1px solid #eee;border-radius:14px;padding:14px;margin-bottom:12px}
.plan-label{font-size:10px;font-weight:700;letter-spacing:0.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.plan-dot{display:inline-block;width:10px;height:10px;border-radius:50%}
.plan-dish{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:6px 0}
.plan-dish-name{font-size:14px;font-weight:600}
.plan-dish-meta{font-size:11px;color:#888;margin-top:2px}
.plan-dish-kcal{font-size:12px;font-weight:700;white-space:nowrap;color:#c0392b}
.empty-plan{font-size:13px;color:#bbb;padding:10px 0;text-align:center}
.total-box{background:#2d4a2d;color:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.total-label{font-size:12px;color:#a8c5a8;margin-bottom:4px}
.total-val{font-size:24px;font-weight:700}
.btn-clear{width:100%;padding:12px;background:#fff;border:1px solid #ddd;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:#888;margin-top:6px}
@media(max-width:380px){.card-name{font-size:13px}}
</style>
</head>
<body>
<header>
  <h1>お弁当献立プランナー</h1>
  <p>主菜1品＋副菜3品をセレクト</p>
</header>
<div class="tab-bar">
  <div class="tab active" onclick="showPage('plan')">献立プラン</div>
  <div class="tab" onclick="showPage('calendar')"><span class="tab-dot" style="background:#8e44ad"></span>カレンダー</div>
  <div class="tab" onclick="showPage('main')"><span class="tab-dot" style="background:#c0392b"></span>主菜</div>
  <div class="tab" onclick="showPage('green')"><span class="tab-dot" style="background:#27ae60"></span>緑</div>
  <div class="tab" onclick="showPage('yellow')"><span class="tab-dot" style="background:#e67e22"></span>黄</div>
  <div class="tab" onclick="showPage('white')"><span class="tab-dot" style="background:#95a5a6"></span>白</div>
  <div class="tab" onclick="showPage('red')"><span class="tab-dot" style="background:#e74c3c"></span>赤</div>
</div>
<div class="container">
  <div class="page active" id="page-plan"><div id="plan-content"></div></div>
  <div class="page" id="page-main"><input class="search-box" type="text" placeholder="主菜を検索..." oninput="filterCards('main',this.value)"><div class="menu-list" id="grid-main"></div></div>
  <div class="page" id="page-green"><input class="search-box" type="text" placeholder="緑の副菜を検索..." oninput="filterCards('green',this.value)"><div class="menu-list" id="grid-green"></div></div>
  <div class="page" id="page-yellow"><input class="search-box" type="text" placeholder="黄色の副菜を検索..." oninput="filterCards('yellow',this.value)"><div class="menu-list" id="grid-yellow"></div></div>
  <div class="page" id="page-white"><input class="search-box" type="text" placeholder="白系の副菜を検索..." oninput="filterCards('white',this.value)"><div class="menu-list" id="grid-white"></div></div>
  <div class="page" id="page-calendar"><div id="calendar-content"></div></div>
  <div class="page" id="page-red"><input class="search-box" type="text" placeholder="赤系の副菜を検索..." oninput="filterCards('red',this.value)"><div class="menu-list" id="grid-red"></div></div>
</div>

var CAT_MAP={
  main:{data:MAIN,color:"#c0392b",label:"主菜",planKey:"planMain"},
  green:{data:SIDE_GREEN,color:"#27ae60",label:"緑の副菜",planKey:"planGreen"},
  yellow:{data:SIDE_YELLOW,color:"#e67e22",label:"黄色の副菜",planKey:"planYellow"},
  white:{data:SIDE_WHITE,color:"#95a5a6",label:"白系の副菜",planKey:"planWhite"},
  red:{data:SIDE_RED,color:"#e74c3c",label:"赤系の副菜",planKey:"planRed"}
};
window.planMain=null;window.planGreen=null;window.planYellow=null;window.planWhite=null;window.planRed=null;

function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('page-'+id).classList.add('active');
  var order=['plan','calendar','main','green','yellow','white','red'];
  document.querySelectorAll('.tab')[order.indexOf(id)].classList.add('active');
  if(id==='plan')renderPlan();
}

function renderCards(cat,dataArr){
  var c=CAT_MAP[cat];
  if(!dataArr)dataArr=c.data;
  var html='';
  for(var i=0;i<dataArr.length;i++){
    var d=dataArr[i];
    var realIdx=c.data.indexOf(d);
    var sel=(window[c.planKey]===d);
    var ingHtml='';
    for(var a=0;a<d.ing.length;a++)ingHtml+='<div>'+d.ing[a]+'</div>';
    var stepsHtml='';
    for(var b=0;b<d.steps.length;b++){
      stepsHtml+='<div class="acc-step"><div class="snum">'+(b+1)+'</div><div class="stxt">'+d.steps[b]+'</div></div>';
    }
    html+='<div class="menu-card'+(sel?' selected':'')+'" id="card-'+cat+'-'+realIdx+'">'
      +'<div class="card-header" onclick="toggleAcc(\''+cat+'\','+realIdx+')">'
      +'<div class="card-color-bar" style="background:'+c.color+'"></div>'
      +'<div class="card-info">'
      +'<div class="card-name">'+d.name+'</div>'
      +'<div class="card-kcal">'+d.kcal+'kcal</div>'
      +'</div>'
      +'<div class="card-right">'
      +'<button class="select-btn'+(sel?' on':'')+'" onclick="selectDish(event,\''+cat+'\','+realIdx+')">'+(sel?'選択済':'選択する')+'</button>'
      +'<span style="font-size:10px;color:#2d4a2d;" id="arr-'+cat+'-'+realIdx+'">詳細 ▼</span>'
      +'</div>'
      +'</div>'
      +'<div class="accordion-body" id="acc-'+cat+'-'+realIdx+'">'
      +'<div class="acc-section">材料（1人分）</div>'
      +'<div class="acc-ing">'+ingHtml+'</div>'
      +'<div class="acc-section">作り方</div>'
      +stepsHtml
      +'</div>'
      +'</div>';
  }
  document.getElementById('grid-'+cat).innerHTML=html;
}

function toggleAcc(cat,idx){
  var body=document.getElementById('acc-'+cat+'-'+idx);
  var arr=document.getElementById('arr-'+cat+'-'+idx);
  if(!body)return;
  if(body.classList.contains('open')){
    body.classList.remove('open');
    if(arr)arr.textContent='詳細 ▼';
  }else{
    body.classList.add('open');
    if(arr)arr.textContent='詳細 ▲';
  }
}

function filterCards(cat,val){
  var c=CAT_MAP[cat];
  var filtered=val?c.data.filter(function(d){return d.name.indexOf(val)>=0||d.ing.join('').indexOf(val)>=0;}):c.data;
  renderCards(cat,filtered);
}

function selectDish(e,cat,idx){
  e.stopPropagation();
  var c=CAT_MAP[cat];
  var d=c.data[idx];
  window[c.planKey]=(window[c.planKey]===d)?null:d;
  renderCards(cat,c.data);
}

function renderPlan(){
  var cats=[
    {key:'planMain',label:'主菜',color:'#c0392b'},
    {key:'planGreen',label:'緑の副菜',color:'#27ae60'},
    {key:'planYellow',label:'黄色の副菜',color:'#e67e22'},
    {key:'planWhite',label:'白系の副菜',color:'#95a5a6'},
    {key:'planRed',label:'赤系の副菜',color:'#e74c3c'}
  ];
  var total=0;
  for(var i=0;i<cats.length;i++){if(window[cats[i].key])total+=window[cats[i].key].kcal;}
  var html='<div class="total-box">'
    +'<div><div class="total-label">合計カロリー（主菜＋副菜）</div>'
    +'<div class="total-val">'+(total?total+' kcal':'-- kcal')+'</div></div>'
    +'<div style="font-size:11px;color:#a8c5a8;text-align:right">目標<br>500〜700kcal</div>'
    +'</div>';
  for(var j=0;j<cats.length;j++){
    var c=cats[j];
    var d=window[c.key];
    html+='<div class="plan-section">'
      +'<div class="plan-label"><span class="plan-dot" style="background:'+c.color+'"></span>'+c.label+'</div>';
    if(d){
      html+='<div class="plan-dish">'
        +'<div><div class="plan-dish-name">'+d.name+'</div>'
        +'<div class="plan-dish-meta">'+d.ing.slice(0,2).join('・')+'など</div></div>'
        +'<div class="plan-dish-kcal">'+d.kcal+'kcal</div></div>';
    }else{
      html+='<div class="empty-plan">未選択 — '+c.label+'タブから選んでください</div>';
    }
    html+='</div>';
  }
  if(total)html+='<button class="btn-clear" onclick="clearPlan()">プランをリセット</button>';
  document.getElementById('plan-content').innerHTML=html;
}

function clearPlan(){
  window.planMain=window.planGreen=window.planYellow=window.planWhite=window.planRed=null;
  renderPlan();
}

renderCards('main');renderCards('green');renderCards('yellow');renderCards('white');renderCards('red');
renderPlan();

// ===== マイメニュー機能 =====
var MY_STORAGE_KEY = 'obento_my_menus';

function loadMyMenus() {
  try {
    var s = localStorage.getItem(MY_STORAGE_KEY);
    return s ? JSON.parse(s) : {main:[],green:[],yellow:[],white:[],red:[]};
  } catch(e) { return {main:[],green:[],yellow:[],white:[],red:[]}; }
}

function saveMyMenus(data) {
  try { localStorage.setItem(MY_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function addMyMenu(cat) {
  var name = document.getElementById('my-name-'+cat).value.trim();
  var kcal = parseInt(document.getElementById('my-kcal-'+cat).value) || 0;
  var ingRaw = document.getElementById('my-ing-'+cat).value.trim();
  var stepsRaw = document.getElementById('my-steps-'+cat).value.trim();
  if (!name) { alert('料理名を入力してください'); return; }
  if (!ingRaw) { alert('材料を入力してください'); return; }
  if (!stepsRaw) { alert('作り方を入力してください'); return; }
  var ing = ingRaw.split('\n').map(function(s){return s.trim();}).filter(function(s){return s;});
  var steps = stepsRaw.split('\n').map(function(s){return s.trim();}).filter(function(s){return s;});
  var data = loadMyMenus();
  data[cat].push({name:name, kcal:kcal, ing:ing, steps:steps, my:true});
  saveMyMenus(data);
  closeMyForm(cat);
  renderCards(cat);
  alert(name + ' を追加しました！');
}

function deleteMyMenu(cat, myIdx) {
  if (!confirm('このレシピを削除しますか？')) return;
  var data = loadMyMenus();
  data[cat].splice(myIdx, 1);
  saveMyMenus(data);
  renderCards(cat);
}

function openMyForm(cat) {
  document.getElementById('my-form-'+cat).style.display='block';
  document.getElementById('my-name-'+cat).value='';
  document.getElementById('my-kcal-'+cat).value='';
  document.getElementById('my-ing-'+cat).value='';
  document.getElementById('my-steps-'+cat).value='';
  document.getElementById('my-name-'+cat).focus();
}

function closeMyForm(cat) {
  document.getElementById('my-form-'+cat).style.display='none';
}

// renderCardsをオーバーライドしてマイメニューも含める
var _origRenderCards = renderCards;
renderCards = function(cat, dataArr) {
  var c = CAT_MAP[cat];
  var myData = loadMyMenus();
  var myList = myData[cat] || [];
  var baseList = dataArr || c.data;

  var html = '';

  // マイメニューを先頭に表示
  if (myList.length > 0) {
    html += '<div style="font-size:11px;font-weight:700;color:'+c.color+';letter-spacing:0.08em;margin-bottom:6px;margin-top:4px">MY RECIPE ('+myList.length+'品)</div>';
    for (var m = 0; m < myList.length; m++) {
      var d = myList[m];
      var myIdx = m;
      var ingHtml = '';
      for (var a = 0; a < d.ing.length; a++) ingHtml += '<div>' + d.ing[a] + '</div>';
      var stepsHtml = '';
      for (var b = 0; b < d.steps.length; b++) {
        stepsHtml += '<div class="acc-step"><div class="snum">'+(b+1)+'</div><div class="stxt">'+d.steps[b]+'</div></div>';
      }
      var sel = false;
      if (window[c.planKey] && window[c.planKey]._myIdx === myIdx && window[c.planKey]._myCat === cat) sel = true;
      html += '<div class="menu-card'+(sel?' selected':'')+'" id="mycard-'+cat+'-'+myIdx+'" style="border-left:3px solid '+c.color+'">'
        + '<div class="card-header" onclick="toggleMyAcc(\''+cat+'\','+myIdx+')">'
        + '<div class="card-color-bar" style="background:'+c.color+'"></div>'
        + '<div class="card-info">'
        + '<div class="card-name">'+d.name+' <span style="font-size:9px;background:'+c.color+';color:#fff;padding:1px 5px;border-radius:8px;vertical-align:middle">MY</span></div>'
        + '<div class="card-kcal">'+(d.kcal?d.kcal+'kcal':'カロリー未設定')+'</div>'
        + '</div>'
        + '<div class="card-right">'
        + '<button class="select-btn'+(sel?' on':'')+'" onclick="selectMyDish(event,\''+cat+'\','+myIdx+')">'+(sel?'選択済':'選択する')+'</button>'
        + '<span style="font-size:10px;color:#2d4a2d;" id="myarr-'+cat+'-'+myIdx+'">詳細 ▼</span>'
        + '</div>'
        + '</div>'
        + '<div class="accordion-body" id="myacc-'+cat+'-'+myIdx+'">'
        + '<div class="acc-section">材料</div>'
        + '<div class="acc-ing">'+ingHtml+'</div>'
        + '<div class="acc-section">作り方</div>'
        + stepsHtml
        + '<button onclick="deleteMyMenu(\''+cat+'\','+myIdx+')" style="margin-top:10px;font-size:11px;color:#c0392b;background:#fff;border:1px solid #e0b0b0;border-radius:8px;padding:5px 12px;cursor:pointer">このレシピを削除</button>'
        + '</div>'
        + '</div>';
    }
    html += '<hr style="border:none;border-top:1px dashed #e0e0e0;margin:10px 0">';
  }

  // 通常メニュー
  for (var i = 0; i < baseList.length; i++) {
    var d2 = baseList[i];
    var realIdx = c.data.indexOf(d2);
    var sel2 = (window[c.planKey] === d2);
    var ingHtml2 = '';
    for (var a2 = 0; a2 < d2.ing.length; a2++) ingHtml2 += '<div>' + d2.ing[a2] + '</div>';
    var stepsHtml2 = '';
    for (var b2 = 0; b2 < d2.steps.length; b2++) {
      stepsHtml2 += '<div class="acc-step"><div class="snum">'+(b2+1)+'</div><div class="stxt">'+d2.steps[b2]+'</div></div>';
    }
    html += '<div class="menu-card'+(sel2?' selected':'')+'" id="card-'+cat+'-'+realIdx+'">'
      + '<div class="card-header" onclick="toggleAcc(\''+cat+'\','+realIdx+')">'
      + '<div class="card-color-bar" style="background:'+c.color+'"></div>'
      + '<div class="card-info">'
      + '<div class="card-name">'+d2.name+'</div>'
      + '<div class="card-kcal">'+d2.kcal+'kcal</div>'
      + '</div>'
      + '<div class="card-right">'
      + '<button class="select-btn'+(sel2?' on':'')+'" onclick="selectDish(event,\''+cat+'\','+realIdx+')">'+(sel2?'選択済':'選択する')+'</button>'
      + '<span style="font-size:10px;color:#2d4a2d;" id="arr-'+cat+'-'+realIdx+'">詳細 ▼</span>'
      + '</div>'
      + '</div>'
      + '<div class="accordion-body" id="acc-'+cat+'-'+realIdx+'">'
      + '<div class="acc-section">材料（1人分）</div>'
      + '<div class="acc-ing">'+ingHtml2+'</div>'
      + '<div class="acc-section">作り方</div>'
      + stepsHtml2
      + '</div>'
      + '</div>';
  }

  document.getElementById('grid-'+cat).innerHTML = html;
};

function toggleMyAcc(cat, idx) {
  var body = document.getElementById('myacc-'+cat+'-'+idx);
  var arr = document.getElementById('myarr-'+cat+'-'+idx);
  if (!body) return;
  if (body.classList.contains('open')) {
    body.classList.remove('open');
    if (arr) arr.textContent = '詳細 ▼';
  } else {
    body.classList.add('open');
    if (arr) arr.textContent = '詳細 ▲';
  }
}

function selectMyDish(e, cat, myIdx) {
  e.stopPropagation();
  var c = CAT_MAP[cat];
  var myData = loadMyMenus();
  var d = myData[cat][myIdx];
  d._myIdx = myIdx;
  d._myCat = cat;
  if (window[c.planKey] && window[c.planKey]._myIdx === myIdx && window[c.planKey]._myCat === cat) {
    window[c.planKey] = null;
  } else {
    window[c.planKey] = d;
  }
  renderCards(cat);
}

// 再初期化
renderCards('main');renderCards('green');renderCards('yellow');renderCards('white');renderCards('red');
renderPlan();

.cal-modal-title{font-size:16px;font-weight:700;color:#2d4a2d;margin-bottom:4px}
.cal-modal-date{font-size:12px;color:#888;margin-bottom:16px}
.cal-modal-section{font-size:11px;font-weight:700;color:#888;letter-spacing:0.08em;margin:14px 0 8px}
.cal-select-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cal-select-label{font-size:11px;font-weight:600;min-width:60px}
.cal-select{flex:1;font-size:13px;padding:7px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-family:inherit}
.cal-modal-btns{display:flex;gap:8px;margin-top:16px}
.cal-modal-btns button{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.cal-btn-save{background:#2d4a2d;color:#fff}
.cal-btn-clear{background:#fff;color:#888;border:1px solid #ddd !important}
.cal-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.cal-legend-item{font-size:10px;color:#888;display:flex;align-items:center;gap:3px}
.cal-legend-dot{width:8px;height:8px;border-radius:50%}
</style>
<script>
var CAL_KEY = 'obento_calendar';
var calYear, calMonth;

function loadCal(){
  try{ var s=localStorage.getItem(CAL_KEY); return s?JSON.parse(s):{}; }catch(e){return {};}
}
function saveCal(data){
  try{ localStorage.setItem(CAL_KEY, JSON.stringify(data)); }catch(e){}
}
function calDateKey(y,m,d){ return y+'-'+(m<10?'0'+m:m)+'-'+(d<10?'0'+d:d); }

function initCalendar(){
  var now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth()+1;
  renderCalendar();
}

function renderCalendar(){
  var data = loadCal();
  var y = calYear, m = calMonth;
  var firstDay = new Date(y, m-1, 1).getDay();
  var lastDate = new Date(y, m, 0).getDate();
  var today = new Date();
  var todayKey = calDateKey(today.getFullYear(), today.getMonth()+1, today.getDate());

  var html = '<div class="cal-header">'
    +'<button class="cal-nav" onclick="calMove(-1)">&#9664;</button>'
    +'<div class="cal-month-label">'+y+'年 '+m+'月</div>'
    +'<button class="cal-nav" onclick="calMove(1)">&#9654;</button>'
    +'</div>'
    +'<div class="cal-legend">'
    +'<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#2d4a2d"></div>今日</div>'
    +'<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#a8c5a8"></div>献立あり</div>'
    +'</div>'
    +'<div class="cal-grid">'
    +'<div class="cal-dow">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div>'
    +'<div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div>'
    +'<div class="cal-dow">土</div>';

  for(var i=0;i<firstDay;i++) html+='<div class="cal-day empty"></div>';

  for(var d=1;d<=lastDate;d++){
    var key = calDateKey(y,m,d);
    var dow = (firstDay+d-1)%7;
    var isToday = (key===todayKey);
    var plan = data[key];
    var hasPlan = plan && (plan.main||plan.green||plan.yellow||plan.white||plan.red);
    var cls = 'cal-day'+(isToday?' today':'')+(hasPlan?' has-plan':'');
    var numCls = 'cal-day-num'+(dow===0?' sun':dow===6?' sat':'');
    html += '<div class="'+cls+'" onclick="openCalModal('+y+','+m+','+d+')">'
      +'<div class="'+numCls+'">'+d+'</div>'
      +'<div class="cal-day-dishes">';
    if(plan){
      var dotColors = {main:'#c0392b',green:'#27ae60',yellow:'#e67e22',white:'#95a5a6',red:'#e74c3c'};
      var dotLabels = {main:'主',green:'緑',yellow:'黄',white:'白',red:'赤'};
      ['main','green','yellow','white','red'].forEach(function(k){
        if(plan[k]){
          html += '<div class="cal-dish-dot" style="color:'+dotColors[k]+'">'+dotLabels[k]+' '+plan[k]+'</div>';
        }
      });
    }
    html += '</div></div>';
  }
  html += '</div>';

  // 月の献立一覧
  var listed = false;
  for(var dd=1;dd<=lastDate;dd++){
    var dkey = calDateKey(y,m,dd);
    var dp = data[dkey];
    if(dp && (dp.main||dp.green||dp.yellow||dp.white||dp.red)){
      if(!listed){ html+='<div style="font-size:12px;font-weight:700;color:#2d4a2d;margin-bottom:8px">今月の献立一覧</div>'; listed=true; }
      html+='<div style="background:#fff;border:1px solid #eee;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer" onclick="openCalModal('+y+','+m+','+dd+')">'
        +'<div style="font-size:12px;font-weight:700;color:#555;margin-bottom:5px">'+m+'月'+dd+'日</div>';
      var knames={main:'主菜',green:'緑',yellow:'黄',white:'白',red:'赤'};
      var kcolors={main:'#c0392b',green:'#27ae60',yellow:'#e67e22',white:'#95a5a6',red:'#e74c3c'};
      ['main','green','yellow','white','red'].forEach(function(k){
        if(dp[k]) html+='<div style="font-size:11px;color:'+kcolors[k]+'">'+knames[k]+'：'+dp[k]+'</div>';
      });
      html+='</div>';
    }
  }

  document.getElementById('calendar-content').innerHTML = html;
}

function calMove(dir){
  calMonth += dir;
  if(calMonth>12){calMonth=1;calYear++;}
  if(calMonth<1){calMonth=12;calYear--;}
  renderCalendar();
}

var calModalY, calModalM, calModalD;

function openCalModal(y,m,d){
  calModalY=y; calModalM=m; calModalD=d;
  var key = calDateKey(y,m,d);
  var data = loadCal();
  var plan = data[key] || {};

  var dow = ['日','月','火','水','木','金','土'][new Date(y,m-1,d).getDay()];
  document.getElementById('cal-modal-title').textContent = y+'年'+m+'月'+d+'日（'+dow+'）の献立';

  // 各セレクトに選択肢を設定
  var cats = [
    {id:'cal-sel-main', data:MAIN, label:'主菜', key:'main'},
    {id:'cal-sel-green', data:SIDE_GREEN, label:'緑の副菜', key:'green'},
    {id:'cal-sel-yellow', data:SIDE_YELLOW, label:'黄色の副菜', key:'yellow'},
    {id:'cal-sel-white', data:SIDE_WHITE, label:'白系の副菜', key:'white'},
    {id:'cal-sel-red', data:SIDE_RED, label:'赤系の副菜', key:'red'},
  ];

  cats.forEach(function(c){
    var sel = document.getElementById(c.id);
    var myData = loadMyMenus();
    var myList = myData[c.key] || [];
    var opts = '<option value="">-- 未選択 --</option>';
    // マイレシピ
    if(myList.length){
      opts += '<optgroup label="マイレシピ">';
      myList.forEach(function(d){ opts+='<option value="MY:'+d.name+'"'+(plan[c.key]==='MY:'+d.name?' selected':'')+'>'+d.name+'</option>'; });
      opts += '</optgroup>';
    }
    opts += '<optgroup label="レシピ一覧">';
    c.data.forEach(function(d){ opts+='<option value="'+d.name+'"'+(plan[c.key]===d.name?' selected':'')+'>'+d.name+'</option>'; });
    opts += '</optgroup>';
    sel.innerHTML = opts;
  });

  document.getElementById('cal-modal-bg').classList.add('show');
}

function closeCalModal(){
  document.getElementById('cal-modal-bg').classList.remove('show');
}

function saveCalPlan(){
  var key = calDateKey(calModalY, calModalM, calModalD);
  var data = loadCal();
  var plan = {
    main: document.getElementById('cal-sel-main').value,
    green: document.getElementById('cal-sel-green').value,
    yellow: document.getElementById('cal-sel-yellow').value,
    white: document.getElementById('cal-sel-white').value,
    red: document.getElementById('cal-sel-red').value,
  };
  // すべて空なら削除
  var hasAny = plan.main||plan.green||plan.yellow||plan.white||plan.red;
  if(hasAny){ data[key]=plan; } else { delete data[key]; }
  saveCal(data);
  closeCalModal();
  renderCalendar();
}

function clearCalDay(){
  var key = calDateKey(calModalY, calModalM, calModalD);
  var data = loadCal();
  delete data[key];
  saveCal(data);
  closeCalModal();
  renderCalendar();
}

// showPageにカレンダー初期化を追加
var _origShowPage = showPage;
showPage = function(id){
  _origShowPage(id);
  if(id==='calendar'){ initCalendar(); }
};
</script>

<!-- カレンダーモーダル -->
<div class="cal-modal-bg" id="cal-modal-bg" onclick="if(event.target===this)closeCalModal()">
  <div class="cal-modal">
    <div class="cal-modal-handle"></div>
    <div class="cal-modal-title" id="cal-modal-title"></div>
    <div class="cal-modal-section">主菜を選ぶ</div>
    <select class="cal-select" id="cal-sel-main"></select>
    <div class="cal-modal-section">緑の副菜を選ぶ</div>
    <select class="cal-select" id="cal-sel-green"></select>
    <div class="cal-modal-section">黄色の副菜を選ぶ</div>
    <select class="cal-select" id="cal-sel-yellow"></select>
    <div class="cal-modal-section">白系の副菜を選ぶ</div>
    <select class="cal-select" id="cal-sel-white"></select>
    <div class="cal-modal-section">赤系の副菜を選ぶ</div>
    <select class="cal-select" id="cal-sel-red"></select>
    <div class="cal-modal-btns">
      <button class="cal-btn-clear" onclick="clearCalDay()">この日をクリア</button>
      <button class="cal-btn-save" onclick="saveCalPlan()">保存する</button>
    </div>
  </div>
</div>

</body>
</html>
