<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シニア向け健康献立</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic Pro','Meiryo','Yu Gothic',sans-serif;background:#f8f8f6;color:#222;font-size:15px}
.app{max-width:100%;margin:0 auto;padding:1rem;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #e8e8e8}
.title{font-size:18px;font-weight:600;color:#222}
.toggle-group{display:flex;border:1px solid #ccc;border-radius:8px;overflow:hidden}
.toggle-btn{padding:6px 16px;font-size:13px;background:#fff;border:none;cursor:pointer;color:#777;transition:all 0.15s}
.toggle-btn.active{background:#f0f0f0;color:#222;font-weight:600}
.nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.nav-btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:14px;color:#555}
.nav-btn:hover{background:#f5f5f5}
.month-label{font-size:17px;font-weight:600;color:#222;min-width:120px;text-align:center}
.calendar-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
.calendar{display:grid;grid-template-columns:repeat(7,minmax(100px,1fr));gap:4px;margin-bottom:1rem;min-width:600px}
.day-header{text-align:center;font-size:12px;color:#777;padding:4px 0;font-weight:600}
.day-header.sun{color:#e24b4a}.day-header.sat{color:#378add}
.day-cell{min-height:88px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:5px;cursor:pointer;transition:all 0.15s}
.day-cell:hover{border-color:#aaa;background:#fafafa}
.day-cell.empty{background:transparent;border-color:transparent;cursor:default}
.day-cell.today{border-color:#378add;border-width:2px}
.day-num{font-size:12px;font-weight:600;color:#888;margin-bottom:3px}
.day-num.sun{color:#e24b4a}.day-num.sat{color:#378add}
.meal-tag{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;line-height:1.4;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-tag{background:#dbeafe;color:#1e40af}
.side-tag{background:#dcfce7;color:#166534}
.tool-btn{padding:6px 14px;font-size:13px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;color:#555}
.tool-btn:hover{background:#f5f5f5}
.bottom-nav{display:flex;gap:8px;margin-top:1rem;border-top:1px solid #e8e8e8;padding-top:1rem}
.bottom-nav-btn{flex:1;padding:9px;font-size:14px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;color:#777}
.bottom-nav-btn.active{background:#f0f0f0;color:#222;font-weight:600}
.view-body{min-height:300px}
.mgmt-section{margin-bottom:1.5rem}
.mgmt-title{font-size:15px;font-weight:600;color:#222;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #e8e8e8}
.dish-list{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;margin-bottom:10px}
.dish-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border:1px solid #e8e8e8;border-radius:8px;font-size:13px;background:#fff}
.dish-item-name{color:#222;flex:1}
.dish-item-cat{font-size:11px;color:#888;margin:0 8px}
.add-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;border:1px solid #e8e8e8;border-radius:10px;background:#fafafa}
.add-form input,.add-form select,.add-form textarea{padding:7px 10px;border:1px solid #ccc;border-radius:8px;font-size:13px;background:#fff;color:#222;font-family:inherit}
.add-form textarea{grid-column:1/-1;resize:vertical;min-height:60px}
.add-form .full{grid-column:1/-1}
.save-btn{grid-column:1/-1;padding:8px;background:#f0f0f0;border:1px solid #ccc;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:#222}
.save-btn:hover{background:#e0e0e0}
.section-label{font-size:13px;color:#555;margin-bottom:5px;font-weight:600}
.recipe-box{background:#f5f5f5;border-radius:8px;padding:11px;margin-bottom:8px;font-size:13px;line-height:1.8;color:#222}
.recipe-title{font-size:12px;font-weight:600;color:#777;margin-bottom:4px}
.portion-info{font-size:12px;color:#777;background:#e8e8e8;border-radius:6px;padding:3px 8px;display:inline-block}
.shuffle-btn{padding:5px 13px;font-size:12px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:#fff;color:#555}
.shuffle-btn:hover{background:#f5f5f5}
.meal-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.divider{border:none;border-top:1px solid #e8e8e8;margin:12px 0}

/* モーダル */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:580px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:17px;font-weight:600;color:#222}
.close-btn{background:#f0f0f0;border:none;font-size:18px;cursor:pointer;color:#555;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:1}
.close-btn:hover{background:#e0e0e0}

/* ===== スマホ対応 ===== */
@media(max-width:600px){
  .app{padding:0.5rem}
  .header{padding:8px 10px;gap:6px}
  .title{font-size:15px}
  .persons-group label{font-size:12px}
  .toggle-btn{padding:5px 9px;font-size:12px}
  .nav{gap:6px;flex-wrap:wrap}
  .nav-btn{padding:4px 8px;font-size:12px}
  .month-label{font-size:14px;min-width:90px}
  .tool-btn{padding:4px 8px;font-size:12px}
  .calendar{grid-template-columns:repeat(7,minmax(44px,1fr));gap:3px;min-width:320px}
  .day-cell{min-height:68px;padding:3px}
  .day-num{font-size:11px}
  .meal-tag{font-size:9px;padding:1px 4px}
  .day-header{font-size:11px}
  .bottom-nav-btn{font-size:13px;padding:8px}
  .add-form{grid-template-columns:1fr}
  .add-form .full{grid-column:1}
  .save-btn{grid-column:1}
  .modal-box{padding:14px;border-radius:10px}
  .modal-title{font-size:15px}
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="title">シニア向け健康献立</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:13px;color:#777">人数：</span>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-2" onclick="setPersons(2)">2人分</button>
        <button class="toggle-btn" id="btn-1" onclick="setPersons(1)">1人分</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="bottom-nav-btn active" onclick="showView('calendar')">カレンダー</button>
    <button class="bottom-nav-btn" onclick="showView('manage')">料理管理</button>
  </div>

  <div id="view-calendar" class="view-body" style="margin-top:1rem">
    <div class="nav">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <div class="month-label" id="month-label"></div>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      <button class="tool-btn" onclick="regen()">再生成</button>
      <button class="tool-btn" onclick="printMonth()">印刷</button>
      <button class="tool-btn" onclick="downloadJSON()">保存</button>
      <button class="tool-btn" onclick="document.getElementById('import-file').click()">読込</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
    <div class="calendar-wrap">
      <div class="calendar" id="calendar"></div>
    </div>
  </div>

  <div id="view-manage" class="view-body" style="margin-top:1rem;display:none">
    <div class="mgmt-section">
      <div class="mgmt-title">主菜一覧（<span id="main-count">0</span>品）</div>
      <div class="dish-list" id="main-list"></div>
    </div>
    <div class="mgmt-section">
      <div class="mgmt-title">副菜一覧（<span id="side-count">0</span>品）</div>
      <div class="dish-list" id="side-list"></div>
    </div>
    <div class="mgmt-section">
      <div class="mgmt-title">料理を追加</div>
      <div class="add-form">
        <input type="text" id="new-name" placeholder="料理名">
        <select id="new-type"><option value="main">主菜</option><option value="side">副菜</option></select>
        <select id="new-cat">
          <option value="魚">魚料理</option><option value="肉">肉料理</option><option value="豆腐">豆腐・豆</option>
          <option value="野菜">野菜メイン</option><option value="卵">卵料理</option><option value="煮物">煮物</option>
          <option value="和え物">和え物・酢の物</option><option value="汁物">汁物・スープ</option>
        </select>
        <input type="text" id="new-ing2" placeholder="材料（2人分）" class="full">
        <input type="text" id="new-ing1" placeholder="材料（1人分）" class="full">
        <textarea id="new-recipe" placeholder="作り方（ステップごとに。で区切る）"></textarea>
        <button class="save-btn" onclick="addDish()">追加する</button>
      </div>
    </div>
  </div>
</div>

<!-- モーダル -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-date"></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
let persons=2,currentYear=new Date().getFullYear(),currentMonth=new Date().getMonth(),schedule={};

const mainDishes=[
  {id:1,name:"さばの味噌煮",cat:"魚",ing2:"さば2切れ・味噌大2・みりん大2・砂糖大1・生姜1片",ing1:"さば1切れ・味噌大1・みりん大1・砂糖小2・生姜少々",recipe:"①さばに熱湯をかけ臭みを取る。②鍋に水・調味料・生姜を入れ沸騰させる。③さばを加え落し蓋をして15分煮る。④煮汁を煮詰めてとろみをつける。"},
  {id:2,name:"鶏の照り焼き",cat:"肉",ing2:"鶏もも肉300g・醤油大2・みりん大2・砂糖大1・サラダ油少々",ing1:"鶏もも肉150g・醤油大1・みりん大1・砂糖小2・サラダ油少々",recipe:"①鶏肉は余分な脂を除き一口大に切る。②調味料を混ぜてタレを作る。③フライパンで皮目から焼き、タレを加えて絡める。④弱火で蒸し焼きにして仕上げる。"},
  {id:3,name:"豆腐の煮物",cat:"豆腐",ing2:"絹豆腐1丁・だし200ml・醤油大1・みりん大1・塩少々",ing1:"絹豆腐半丁・だし100ml・醤油小2・みりん小2・塩少々",recipe:"①豆腐を食べやすい大きさに切る。②鍋にだしと調味料を入れて煮立てる。③豆腐を加え弱火で10分煮る。④溶き片栗粉でとろみをつけて完成。"},
  {id:4,name:"ほうれん草と卵の炒め物",cat:"野菜",ing2:"ほうれん草1束・卵2個・醤油大1・塩こしょう少々・ごま油小1",ing1:"ほうれん草半束・卵1個・醤油小1・塩こしょう少々・ごま油少々",recipe:"①ほうれん草は茹でて5cmに切る。②フライパンでごま油を熱し卵をほぐしながら炒める。③ほうれん草を加え醤油で味付けする。"},
  {id:5,name:"鮭のホイル焼き",cat:"魚",ing2:"生鮭2切れ・玉ねぎ半個・えのき1袋・バター10g・醤油小2",ing1:"生鮭1切れ・玉ねぎ四分の一・えのき半袋・バター5g・醤油小1",recipe:"①鮭と野菜をアルミホイルに包む。②バターと醤油をかけて包む。③魚焼きグリルかオーブンで12分焼く。"},
  {id:6,name:"豚の生姜焼き",cat:"肉",ing2:"豚ロース薄切り200g・玉ねぎ半個・醤油大2・みりん大1・生姜すりおろし1片",ing1:"豚ロース薄切り100g・玉ねぎ四分の一・醤油大1・みりん小2・生姜少々",recipe:"①豚肉に下味をつける。②フライパンで玉ねぎを炒める。③豚肉を加え火を通しタレで絡める。"},
  {id:7,name:"あじの南蛮漬け",cat:"魚",ing2:"あじ4尾・酢大3・砂糖大1・醤油大1・玉ねぎ半個・唐辛子1本",ing1:"あじ2尾・酢大1.5・砂糖小2・醤油小2・玉ねぎ四分の一・唐辛子少々",recipe:"①あじに片栗粉をまぶして揚げる。②南蛮酢を合わせておく。③揚げたあじを南蛮酢に1時間以上漬ける。"},
  {id:8,name:"肉じゃが",cat:"肉",ing2:"牛薄切り150g・じゃがいも3個・玉ねぎ1個・だし300ml・醤油大3・みりん大2・砂糖大1",ing1:"牛薄切り75g・じゃがいも1.5個・玉ねぎ半個・だし150ml・醤油大1.5・みりん大1・砂糖小2",recipe:"①じゃがいもは一口大に切り水にさらす。②鍋で肉と玉ねぎを炒める。③じゃがいもとだし・調味料を加え煮る。④じゃがいもが柔らかくなったら完成。"},
  {id:9,name:"茶碗蒸し",cat:"卵",ing2:"卵2個・だし300ml・醤油小1・塩少々・鶏肉50g・三つ葉少々",ing1:"卵1個・だし150ml・醤油少々・塩少々・鶏肉25g・三つ葉少々",recipe:"①卵をよく溶きだしと調味料を混ぜて濾す。②具材を器に入れて卵液を注ぐ。③蒸し器で中火10分・弱火5分蒸す。"},
  {id:10,name:"ぶりの照り焼き",cat:"魚",ing2:"ぶり2切れ・醤油大2・みりん大2・酒大1・砂糖小1",ing1:"ぶり1切れ・醤油大1・みりん大1・酒小2・砂糖少々",recipe:"①ぶりに下味をつけ10分置く。②フライパンで両面焼く。③タレを加えて絡め照りを出す。"},
  {id:11,name:"鶏ささみの梅和え",cat:"肉",ing2:"鶏ささみ4本・梅干し2個・大葉4枚・醤油小1",ing1:"鶏ささみ2本・梅干し1個・大葉2枚・醤油少々",recipe:"①ささみを茹でて冷ます。②梅干しの種を取り包丁でたたく。③ほぐしたささみと梅・大葉を和える。"},
  {id:12,name:"豆腐ステーキ",cat:"豆腐",ing2:"木綿豆腐1丁・醤油大1・みりん大1・ポン酢大1・大根おろし適量・ごま油大1",ing1:"木綿豆腐半丁・醤油小1・みりん小1・ポン酢小1・大根おろし少々・ごま油小1",recipe:"①豆腐は水切りして厚めに切る。②ごま油で両面こんがり焼く。③合わせ調味料をかけ大根おろしを添える。"},
  {id:13,name:"鰆の西京焼き",cat:"魚",ing2:"鰆2切れ・西京味噌大3・みりん大1・酒大1",ing1:"鰆1切れ・西京味噌大1.5・みりん小2・酒小2",recipe:"①味噌床を作り鰆を2日漬ける。②味噌を拭き取りグリルで焼く。③焦げないよう弱火でじっくり焼く。"},
  {id:14,name:"豚汁",cat:"肉",ing2:"豚バラ100g・大根100g・にんじん1本・ごぼう半本・味噌大3・だし600ml",ing1:"豚バラ50g・大根50g・にんじん半本・ごぼう少々・味噌大1.5・だし300ml",recipe:"①野菜を切り豚肉と炒める。②だしを加えて煮る。③野菜が柔らかくなったら味噌を溶き入れる。"},
  {id:15,name:"卵豆腐",cat:"卵",ing2:"卵4個・だし300ml・醤油小1・塩少々・みりん小1",ing1:"卵2個・だし150ml・醤油少々・塩少々・みりん少々",recipe:"①卵をよく溶き調味料を加えてよく混ぜ濾す。②容器に流し込みラップをして湯煎で蒸す。③冷やして食べやすく切り出汁をかける。"},
  {id:16,name:"タラのちり鍋",cat:"魚",ing2:"タラ2切れ・豆腐半丁・白菜3枚・ポン酢適量・だし400ml",ing1:"タラ1切れ・豆腐四分の一・白菜1枚・ポン酢適量・だし200ml",recipe:"①だしを煮立て白菜・豆腐を入れる。②タラを加えて火が通るまで煮る。③ポン酢で食べる。"},
  {id:17,name:"鶏の水炊き",cat:"肉",ing2:"鶏もも肉250g・白菜4枚・豆腐1丁・春菊少々・ポン酢適量",ing1:"鶏もも肉125g・白菜2枚・豆腐半丁・春菊少々・ポン酢適量",recipe:"①昆布でだしをとる。②鶏肉をアクを取りながら煮る。③白菜・豆腐・春菊を加え火が通ったらポン酢で。"},
  {id:18,name:"ひじきの煮物（主菜風）",cat:"野菜",ing2:"乾燥ひじき20g・油揚げ1枚・にんじん半本・だし150ml・醤油大2・みりん大1・砂糖大1",ing1:"乾燥ひじき10g・油揚げ半枚・にんじん少々・だし75ml・醤油大1・みりん小2・砂糖小2",recipe:"①ひじきを水で戻す。②油揚げ・にんじんを細切りにする。③ごま油で炒め、だしと調味料を加えて煮含める。"},
  {id:19,name:"いわしの梅煮",cat:"魚",ing2:"いわし4尾・梅干し2個・醤油大2・みりん大2・酒大2・砂糖大1",ing1:"いわし2尾・梅干し1個・醤油大1・みりん大1・酒大1・砂糖小2",recipe:"①いわしを洗い内臓を取る。②鍋に調味料と梅干しを入れ煮立てる。③いわしを加え落し蓋で20分煮る。"},

}
function showView(v){

  document.getElementById('view-manage').style.display=v==='manage'?'block':'none';
  document.querySelectorAll('.bottom-nav-btn').forEach((b,i)=>{

function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function getFirstDay(y,m){return new Date(y,m,1).getDay();}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function generateSchedule(y,m){
  const days=getDaysInMonth(y,m),sm=shuffle(mainDishes),ss=shuffle(sideDishes),sch={};
  for(let d=1;d<=days;d++) sch[d]={main:sm[(d-1)%sm.length],sides:[ss[(d*2-2)%ss.length],ss[(d*2-1)%ss.length]]};
  schedule[`${y}-${m}`]=sch;
}
function getSchedule(y,m){const k=`${y}-${m}`;if(!schedule[k])generateSchedule(y,m);return schedule[k];}
function renderCalendar(){

  const dn=['日','月','火','水','木','金','土'],dc=['sun','','','','','','sat'];
  let html=dn.map((d,i)=>`<div class="day-header ${dc[i]}">${d}</div>`).join('');
  const first=getFirstDay(currentYear,currentMonth),total=getDaysInMonth(currentYear,currentMonth);
  const sch=getSchedule(currentYear,currentMonth),today=new Date();
  for(let i=0;i<first;i++) html+=`<div class="day-cell empty"></div>`;
  for(let d=1;d<=total;d++){
    const dow=(first+d-1)%7,isToday=today.getFullYear()===currentYear&&today.getMonth()===currentMonth&&today.getDate()===d;
    const meal=sch[d],nc=dow===0?'sun':dow===6?'sat':'';
    html+=`<div class="day-cell${isToday?' today':''}" onclick="openDay(${d})">
      <div class="day-num ${nc}">${d}</div>
      ${meal?`<span class="meal-tag main-tag">${meal.main.name}</span><span class="meal-tag side-tag">${meal.sides[0].name}</span><span class="meal-tag side-tag">${meal.sides[1].name}</span>`:''}
    </div>`;
  }
  cal.innerHTML=html;
}
function openDay(d){
  const sch=getSchedule(currentYear,currentMonth),meal=sch[d];
  if(!meal) return;
  const p=persons,ing=p===2?'ing2':'ing1',pLabel=p===2?'2人分':'1人分';
  document.getElementById('modal-date').textContent=`${currentMonth+1}月${d}日の献立`;
  const sidesHtml=meal.sides.map((s,idx)=>`
    <div style="margin-bottom:12px">
      <div class="meal-section-header">
        <div class="section-label">副菜${idx+1}：${s.name}</div>
        <button class="shuffle-btn" onclick="swapSide(${d},${idx})">変える</button>
      </div>
      <div class="recipe-box">
        <div class="recipe-title">材料（${pLabel}）</div><div>${s[ing]}</div>
        <div class="recipe-title" style="margin-top:6px">作り方</div><div>${s.recipe.replace(/。(?!$)/g,'。<br>')}</div>
      </div>
    </div>`).join('');
  document.getElementById('modal-body').innerHTML=`
    <div class="meal-section-header">
      <div class="section-label">主菜：${meal.main.name}　<span class="portion-info">${pLabel}</span></div>
      <button class="shuffle-btn" onclick="swapMain(${d})">変える</button>
    </div>
    <div class="recipe-box">
      <div class="recipe-title">材料</div><div>${meal.main[ing]}</div>
      <div class="recipe-title" style="margin-top:6px">作り方</div><div>${meal.main.recipe.replace(/。(?!$)/g,'。<br>')}</div>
    </div>
    <div class="divider"></div>
    ${sidesHtml}`;
  document.getElementById('modal-overlay').classList.add('open');
}
function swapMain(d){
  const k=`${currentYear}-${currentMonth}`,sch=schedule[k],cur=sch[d].main;
  const others=mainDishes.filter(m=>m.id!==cur.id);
  if(others.length){sch[d].main=others[Math.floor(Math.random()*others.length)];renderCalendar();openDay(d);}
}
function swapSide(d,idx){
  const k=`${currentYear}-${currentMonth}`,sch=schedule[k],cur=sch[d].sides[idx];
  const avail=sideDishes.filter(s=>s.id!==cur.id&&s.id!==sch[d].sides[1-idx].id);
  if(avail.length){sch[d].sides[idx]=avail[Math.floor(Math.random()*avail.length)];renderCalendar();openDay(d);}
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay')) closeModal();}
function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth<0){currentMonth=11;currentYear--;}
  if(currentMonth>11){currentMonth=0;currentYear++;}
  renderCalendar();
}
function regen(){delete schedule[`${currentYear}-${currentMonth}`];renderCalendar();}
function renderManage(){
  document.getElementById('main-count').textContent=mainDishes.length;
  document.getElementById('side-count').textContent=sideDishes.length;
  document.getElementById('main-list').innerHTML=mainDishes.map(d=>`<div class="dish-item"><span class="dish-item-name">${d.name}</span><span class="dish-item-cat">${d.cat}</span></div>`).join('');
  document.getElementById('side-list').innerHTML=sideDishes.map(d=>`<div class="dish-item"><span class="dish-item-name">${d.name}</span><span class="dish-item-cat">${d.cat}</span></div>`).join('');
}
function addDish(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){alert('料理名を入力してください');return;}
  const dish={id:Date.now(),name,cat:document.getElementById('new-cat').value,
    ing2:document.getElementById('new-ing2').value.trim(),
    ing1:document.getElementById('new-ing1').value.trim(),
    recipe:document.getElementById('new-recipe').value.trim()};
  if(document.getElementById('new-type').value==='main') mainDishes.push(dish); else sideDishes.push(dish);
  ['new-name','new-ing2','new-ing1','new-recipe'].forEach(id=>document.getElementById(id).value='');
  renderManage();
  alert(`「${name}」を追加しました！`);
}
function downloadJSON(){
  const sch=getSchedule(currentYear,currentMonth);
  const data={version:1,year:currentYear,month:currentMonth+1,persons,mainDishes,sideDishes,
    schedule:Object.fromEntries(Object.entries(sch).map(([d,m])=>([d,{mainId:m.main.id,sideIds:m.sides.map(s=>s.id)}])))};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`献立_${currentYear}年${currentMonth+1}月.json`;
  a.click();
}
function importJSON(event){
  const file=event.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.version!==1) throw new Error();
      data.mainDishes.forEach(d=>{if(!mainDishes.find(m=>m.id===d.id)) mainDishes.push(d);});
      data.sideDishes.forEach(d=>{if(!sideDishes.find(s=>s.id===d.id)) sideDishes.push(d);});
      const y=data.year,m=data.month-1,rebuilt={};
      for(const [day,ids] of Object.entries(data.schedule)){
        const main=mainDishes.find(d=>d.id===ids.mainId);
        const sides=ids.sideIds.map(id=>sideDishes.find(d=>d.id===id));
        if(main&&sides.every(Boolean)) rebuilt[day]={main,sides};
      }
      schedule[`${y}-${m}`]=rebuilt;
      currentYear=y;currentMonth=m;renderCalendar();
      alert(`${y}年${m+1}月の献立を読み込みました！`);
    }catch{alert('読み込みに失敗しました。');}
  };
  reader.readAsText(file);event.target.value='';
}
function printMonth(){
  const sch=getSchedule(currentYear,currentMonth);
  const pLabel=persons===2?'2人分':'1人分',ing=persons===2?'ing2':'ing1';
  const days=getDaysInMonth(currentYear,currentMonth),first=getFirstDay(currentYear,currentMonth);
  let rows='';
  for(let d=1;d<=days;d++){
    const m=sch[d];if(!m) continue;
    const dow=['日','月','火','水','木','金','土'][(first+d-1)%7];
    rows+=`<tr><td>${d}日（${dow}）</td><td>${m.main.name}</td><td style="font-size:11px;color:#555">${m.main[ing]}</td><td>${m.sides[0].name}<br><span style="font-size:10px;color:#777">${m.sides[0][ing]}</span></td><td>${m.sides[1].name}<br><span style="font-size:10px;color:#777">${m.sides[1][ing]}</span></td></tr>`;
  }
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>${currentYear}年${currentMonth+1}月 献立表</title><style>body{font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;padding:20px;font-size:13px}h1{font-size:18px;font-weight:600;margin-bottom:4px}.sub{font-size:12px;color:#666;margin-bottom:16px}table{width:100%;border-collapse:collapse}th,td{padding:7px 8px;border:1px solid #ccc;text-align:left}th{background:#f0f0f0;font-weight:600;font-size:12px}tr:nth-child(even){background:#fafafa}@media print{button{display:none}}</style></head><body><h1>${currentYear}年${currentMonth+1}月 献立表</h1><div class="sub">${pLabel}用 ／ シニア向け健康献立</div><button onclick="window.print()" style="margin-bottom:16px;padding:6px 16px;cursor:pointer;font-size:13px">印刷する</button><table><thead><tr><th style="width:80px">日付</th><th style="width:120px">主菜</th><th>主菜材料</th><th style="width:140px">副菜1</th><th style="width:140px">副菜2</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
  win.document.close();
}
renderCalendar();
</script>
</body>
</html>
