<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>炊飯器レシピ献立</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic Pro','Meiryo','Yu Gothic',sans-serif;background:#fff8f0;color:#222;font-size:15px}
.app{max-width:100%;margin:0 auto;padding:1rem;overflow-x:hidden}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #fde8cc}
.title{font-size:19px;font-weight:700;color:#2d2d2d}
.title span{font-size:13px;font-weight:400;color:#888;margin-left:8px}
.persons-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.persons-group label{font-size:13px;color:#777}
.toggle-group{display:flex;border:1px solid #e0c090;border-radius:8px;overflow:hidden}
.toggle-btn{padding:6px 13px;font-size:13px;background:#fff;border:none;cursor:pointer;color:#777;transition:all 0.15s}
.toggle-btn.active{background:#c07020;color:#fff;font-weight:600}
.nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.nav-btn{background:#fff;border:1px solid #e0c090;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:14px;color:#555}
.nav-btn:hover{background:#fff8f0}
.month-label{font-size:17px;font-weight:700;color:#2d2d2d;min-width:120px;text-align:center}
.calendar-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
.calendar{display:grid;grid-template-columns:repeat(7,minmax(100px,1fr));gap:4px;margin-bottom:1rem;min-width:600px}
.day-header{text-align:center;font-size:12px;color:#888;padding:4px 0;font-weight:600}
.day-header.sun{color:#e24b4a}.day-header.sat{color:#378add}
.day-cell{min-height:90px;background:#fff;border:1px solid #fde8cc;border-radius:8px;padding:5px;cursor:pointer;transition:all 0.15s}
.day-cell:hover{border-color:#c07020;background:#fff8f0}
.day-cell.empty{background:transparent;border-color:transparent;cursor:default}
.day-cell.today{border-color:#c07020;border-width:2px}
.day-num{font-size:12px;font-weight:600;color:#888;margin-bottom:3px}
.day-num.sun{color:#e24b4a}.day-num.sat{color:#378add}
.meal-tag{font-size:10px;padding:2px 5px;border-radius:4px;margin-bottom:2px;line-height:1.4;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.main-tag{background:#fed7aa;color:#9a3412}
.side-tag{background:#fef9c3;color:#854d0e}
.tool-btn{padding:6px 14px;font-size:13px;border:1px solid #e0c090;border-radius:8px;cursor:pointer;background:#fff;color:#555}
.tool-btn:hover{background:#fff8f0}
.bottom-nav{display:flex;gap:8px;margin-top:1rem;border-top:1px solid #fde8cc;padding-top:1rem}
.bottom-nav-btn{flex:1;padding:9px;font-size:14px;border:1px solid #e0c090;border-radius:8px;cursor:pointer;background:#fff;color:#777}
.bottom-nav-btn.active{background:#c07020;color:#fff;font-weight:600}
.view-body{min-height:300px}
.mgmt-section{margin-bottom:1.5rem}
.mgmt-title{font-size:15px;font-weight:700;color:#2d2d2d;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #fde8cc}
.dish-list{display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;margin-bottom:10px}
.dish-item{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border:1px solid #fde8cc;border-radius:8px;font-size:13px;background:#fff}
.dish-item-name{color:#222;flex:1}
.dish-item-cat{font-size:11px;color:#888;margin:0 8px}
.add-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;border:1px solid #fde8cc;border-radius:10px;background:#fff8f0}
.add-form input,.add-form select,.add-form textarea{padding:7px 10px;border:1px solid #e0c090;border-radius:8px;font-size:13px;background:#fff;color:#222;font-family:inherit}
.add-form textarea{grid-column:1/-1;resize:vertical;min-height:60px}
.add-form .full{grid-column:1/-1}
.save-btn{grid-column:1/-1;padding:8px;background:#c07020;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:#fff}
.save-btn:hover{background:#a05010}
.section-label{font-size:13px;color:#555;margin-bottom:5px;font-weight:600}
.recipe-box{background:#fff8f0;border:1px solid #fde8cc;border-radius:8px;padding:11px;margin-bottom:8px;font-size:13px;line-height:1.8;color:#222}
.recipe-title{font-size:12px;font-weight:600;color:#a05010;margin-bottom:4px}
.portion-badge{font-size:12px;color:#fff;background:#c07020;border-radius:6px;padding:3px 10px;display:inline-block;margin-left:6px}
.tip-badge{font-size:11px;background:#fef9c3;color:#854d0e;border:1px solid #fde68a;border-radius:4px;padding:2px 8px;display:inline-block;margin-left:6px}
.shuffle-btn{padding:5px 13px;font-size:12px;border:1px solid #e0c090;border-radius:6px;cursor:pointer;background:#fff;color:#555}
.shuffle-btn:hover{background:#fff8f0}
.meal-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.divider{border:none;border-top:1px solid #fde8cc;margin:12px 0}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:620px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:17px;font-weight:700;color:#2d2d2d}
.close-btn{background:#f0f0f0;border:none;font-size:18px;cursor:pointer;color:#555;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.close-btn:hover{background:#e0e0e0}
.rice-icon{display:inline-block;font-size:16px;margin-right:4px}

/* ===== スマホ対応 ===== */
@media(max-width:600px){
  .app{padding:0.5rem}
  .header{padding:8px 10px;gap:6px}
  .title{font-size:15px}
  .title span{display:none}
  .persons-group label{font-size:12px}
  .toggle-btn{padding:5px 9px;font-size:12px}
  .nav{gap:6px;flex-wrap:wrap}
  .nav-btn{padding:4px 8px;font-size:12px}
  .month-label{font-size:14px;min-width:90px}
  .tool-btn{padding:4px 8px;font-size:12px}
  .calendar{grid-template-columns:repeat(7,minmax(44px,1fr));gap:3px;min-width:320px}
  .day-cell{min-height:68px;padding:3px}
  .day-num{font-size:11px}
  .meal-tag{font-size:9px;padding:1px 4px}
  .day-header{font-size:11px}
  .bottom-nav-btn{font-size:13px;padding:8px}
  .add-form{grid-template-columns:1fr}
  .add-form .full{grid-column:1}
  .save-btn{grid-column:1}
  .modal-box{padding:14px;border-radius:10px}
  .modal-title{font-size:15px}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">🍚 炊飯器レシピ献立 <span>炊飯器まかせ</span></div>
    <div class="persons-group">
      <label>人数：</label>
      <div class="toggle-group">
        <button class="toggle-btn active" id="btn-2" onclick="setPersons(2)">2人</button>
        <button class="toggle-btn" id="btn-3" onclick="setPersons(3)">3人</button>
        <button class="toggle-btn" id="btn-4" onclick="setPersons(4)">4人</button>
        <button class="toggle-btn" id="btn-5" onclick="setPersons(5)">5人</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="bottom-nav-btn active" onclick="showView('calendar')">カレンダー</button>
    <button class="bottom-nav-btn" onclick="showView('manage')">レシピ管理</button>
  </div>

  <div id="view-calendar" class="view-body" style="margin-top:1rem">
    <div class="nav">
      <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
      <div class="month-label" id="month-label"></div>
      <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      <button class="tool-btn" onclick="regen()">再生成</button>
      <button class="tool-btn" onclick="printMonth()">印刷</button>
      <button class="tool-btn" onclick="downloadJSON()">保存</button>
      <button class="tool-btn" onclick="document.getElementById('import-file').click()">読込</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
    <div class="calendar-wrap">
      <div class="calendar" id="calendar"></div>
    </div>
  </div>

  <div id="view-manage" class="view-body" style="margin-top:1rem;display:none">
    <div class="mgmt-section">
      <div class="mgmt-title">主菜レシピ一覧（<span id="main-count">0</span>品）</div>
      <div class="dish-list" id="main-list"></div>
    </div>
    <div class="mgmt-section">
      <div class="mgmt-title">副菜レシピ一覧（<span id="side-count">0</span>品）</div>
      <div class="dish-list" id="side-list"></div>
    </div>
    <div class="mgmt-section">
      <div class="mgmt-title">レシピを追加</div>
      <div class="add-form">
        <input type="text" id="new-name" placeholder="料理名">
        <select id="new-type"><option value="main">主菜</option><option value="side">副菜（おかず）</option></select>
        <select id="new-cat">
          <option value="肉">肉料理</option><option value="魚">魚介</option><option value="豆腐">豆腐・豆</option>
          <option value="野菜">野菜</option><option value="卵">卵料理</option><option value="ご飯">炊き込みご飯</option>
          <option value="スープ">スープ・汁物</option><option value="スイーツ">スイーツ・デザート</option>
        </select>
        <input type="text" id="new-ing2" placeholder="材料（2人分）" class="full">
        <input type="text" id="new-ing5" placeholder="材料（5人分）" class="full">
        <textarea id="new-recipe" placeholder="炊飯器での作り方（①②③…）"></textarea>
        <input type="text" id="new-tip" placeholder="炊飯器のコツ（任意）" class="full">
        <select id="new-mode">
          <option value="普通炊飯">普通炊飯モード</option>
          <option value="早炊き">早炊きモード</option>
          <option value="煮込み">煮込みモード</option>
          <option value="蒸し">蒸しモード</option>
          <option value="保温">保温機能</option>
        </select>
        <button class="save-btn full" onclick="addDish()">追加する</button>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-date"></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
let persons=2,currentYear=new Date().getFullYear(),currentMonth=new Date().getMonth(),schedule={};

// 炊飯器レシピ 主菜50品＋α（2人分と5人分を基準）
const mainDishes=[
  {id:1,name:"炊き込みご飯（鶏とごぼう）",cat:"ご飯",mode:"普通炊飯",ing2:"米2合・鶏もも150g・ごぼう半本・にんじん半本・醤油大2・みりん大1・酒大1・だし350ml",ing5:"米5合・鶏もも375g・ごぼう1本・にんじん1本・醤油大5・みりん大3・酒大3・だし875ml",tip:"具材は米の上にのせてスイッチオン。混ぜずに炊くのがコツ。",recipe:"①米を研いで炊飯器に入れる。②だしと調味料を合わせて内釜に入れる。③具材を上にのせて普通炊飯する。④炊き上がったら底からよく混ぜる。"},
  {id:2,name:"サバの味噌煮",cat:"魚",mode:"煮込み",ing2:"さば2切れ・味噌大2・みりん大2・砂糖大1・生姜1片・酒大2・水100ml",ing5:"さば5切れ・味噌大5・みりん大5・砂糖大2・生姜2片・酒大5・水250ml",tip:"煮込みモードなら焦がす心配なし。",recipe:"①さばに熱湯をかける。②調味料と水を炊飯器に入れる。③さばと生姜を加えて煮込みモードで炊く。"},
  {id:3,name:"鶏の照り焼き",cat:"肉",mode:"普通炊飯",ing2:"鶏もも300g・醤油大2・みりん大2・砂糖大1・にんにく少々",ing5:"鶏もも750g・醤油大5・みりん大5・砂糖大2・にんにく少々",tip:"皮目を上にして入れるとジューシーに仕上がる。",recipe:"①鶏もも肉に調味料を揉み込み30分置く。②炊飯器に入れてスイッチオン。③炊き上がったら食べやすく切る。"},
  {id:4,name:"豚の角煮",cat:"肉",mode:"煮込み",ing2:"豚バラブロック400g・醤油大3・みりん大2・砂糖大2・酒大3・生姜1片・ゆで卵2個",ing5:"豚バラブロック1kg・醤油大7・みりん大5・砂糖大5・酒大7・生姜2片・ゆで卵5個",tip:"煮込みモードを2回繰り返すとトロトロになる。",recipe:"①豚バラを大きめに切る。②炊飯器に全材料を入れる。③煮込みモードで1〜2回炊く。④ゆで卵を加えて保温で30分。"},
  {id:5,name:"炊き込みご飯（きのこ）",cat:"ご飯",mode:"普通炊飯",ing2:"米2合・しめじ1袋・えのき1袋・しいたけ4枚・醤油大2・みりん大1・酒大1・だし350ml",ing5:"米5合・しめじ2袋・えのき2袋・しいたけ8枚・醤油大5・みりん大3・酒大3・だし875ml",tip:"きのこは石突きを取って手でほぐして入れる。",recipe:"①米を研いでだし・調味料を入れる。②きのこを上にのせて普通炊飯する。③炊き上がったら混ぜる。"},
  {id:6,name:"チキンカレー",cat:"肉",mode:"煮込み",ing2:"鶏もも300g・じゃがいも2個・玉ねぎ1個・にんじん1本・カレールー2皿・水300ml",ing5:"鶏もも750g・じゃがいも5個・玉ねぎ2個・にんじん2本・カレールー5皿・水750ml",tip:"ルーは炊き上がってから加えてよく混ぜる。",recipe:"①材料を切って炊飯器に入れる。②水を加えて煮込みモードで炊く。③炊き上がったらカレールーを加えてよく混ぜる。"},
  {id:7,name:"ローストチキン風",cat:"肉",mode:"普通炊飯",ing2:"鶏もも骨付き2本・塩こしょう少々・にんにく2片・ローズマリー少々・オリーブオイル大1",ing5:"鶏もも骨付き5本・塩こしょう少々・にんにく4片・ローズマリー少々・オリーブオイル大2",tip:"焼き色はトースターで追加するとより美味しい。",recipe:"①鶏もも肉に塩こしょうとにんにく・ハーブを揉み込む。②炊飯器に入れてスイッチオン。③炊き上がったらトースターで3〜5分焼く。"},
  {id:8,name:"豚汁",cat:"スープ",mode:"普通炊飯",ing2:"豚バラ100g・大根100g・にんじん1本・ごぼう半本・こんにゃく半枚・味噌大3・だし600ml",ing5:"豚バラ250g・大根250g・にんじん2本・ごぼう1本・こんにゃく1枚・味噌大7・だし1.5L",tip:"味噌は炊き上がってから加える。",recipe:"①野菜を切って炊飯器に入れる。②だしを加えてスイッチオン。③炊き上がったら味噌を溶かす。"},
  {id:9,name:"炊き込みご飯（おこわ風）",cat:"ご飯",mode:"普通炊飯",ing2:"もち米1合・米1合・ひじき乾燥10g・枝豆50g・醤油大2・みりん大1・酒大1・だし350ml",ing5:"もち米2.5合・米2.5合・ひじき乾燥25g・枝豆125g・醤油大5・みりん大3・酒大3・だし875ml",tip:"もち米は水に30分浸けてから。",recipe:"①もち米と米を研いで水に浸ける。②ひじきを戻す。③炊飯器に全材料を入れて普通炊飯する。"},
  {id:10,name:"ポトフ",cat:"スープ",mode:"普通炊飯",ing2:"ウインナー4本・じゃがいも2個・にんじん1本・キャベツ二分の一・玉ねぎ1個・コンソメ2個・水500ml",ing5:"ウインナー10本・じゃがいも5個・にんじん2本・キャベツ1個・玉ねぎ2個・コンソメ4個・水1.2L",tip:"野菜は大きめに切ると食感が残る。",recipe:"①野菜を大きめに切る。②炊飯器に全材料を入れてスイッチオン。③塩こしょうで味を調える。"},
  {id:11,name:"塩豚",cat:"肉",mode:"普通炊飯",ing2:"豚バラブロック400g・塩大1・にんにく2片・ローリエ1枚・水100ml",ing5:"豚バラブロック1kg・塩大2・にんにく4片・ローリエ2枚・水250ml",tip:"前日に塩をまぶして冷蔵庫に入れておくと旨味がUP。",recipe:"①豚バラに塩をまぶして冷蔵庫で一晩置く。②炊飯器ににんにく・ローリエ・水と一緒に入れる。③普通炊飯する。④冷ましてスライスする。"},
  {id:12,name:"サーモンの蒸し煮",cat:"魚",mode:"普通炊飯",ing2:"サーモン2切れ・玉ねぎ半個・バター10g・白ワイン大2・塩こしょう少々・レモン半個",ing5:"サーモン5切れ・玉ねぎ1個・バター25g・白ワイン大5・塩こしょう少々・レモン1個",tip:"白ワインの代わりに酒でもOK。",recipe:"①玉ねぎを薄切りにして炊飯器に敷く。②サーモンを乗せてバター・ワイン・塩こしょうをかける。③普通炊飯する。④レモンを絞って完成。"},
  {id:13,name:"おでん",cat:"その他",mode:"煮込み",ing2:"大根・こんにゃく・はんぺん・ちくわ・卵各2個・だし600ml・醤油大2・みりん大2・塩少々",ing5:"大根・こんにゃく・はんぺん・ちくわ・卵各5個・だし1.5L・醤油大5・みりん大5・塩少々",tip:"煮込みモードを2回繰り返すと味が染みる。",recipe:"①大根は下茹でする。②炊飯器に全材料を入れる。③煮込みモードで1〜2回炊く。"},

function getIng(dish, n) {
  if (n <= 2) return dish.ing2;
  if (n >= 5) return dish.ing5;
  return dish.ing2 + `（${n}人分：約${Math.round(n/2*10)/10}倍を目安に）`;
}

function setPersons(n){
  persons=n;
  [2,3,4,5].forEach(i=>{
    document.getElementById(`btn-${i}`).classList.toggle('active',i===n);
  });
}
function showView(v){
  document.getElementById('view-calendar').style.display=v==='calendar'?'block':'none';
  document.getElementById('view-manage').style.display=v==='manage'?'block':'none';
  document.querySelectorAll('.bottom-nav-btn').forEach((b,i)=>{
    b.classList.toggle('active',(i===0&&v==='calendar')||(i===1&&v==='manage'));
  });
  if(v==='manage') renderManage();
}
function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function getFirstDay(y,m){return new Date(y,m,1).getDay();}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function generateSchedule(y,m){
  const days=getDaysInMonth(y,m),sm=shuffle(mainDishes),ss=shuffle(sideDishes),sch={};
  for(let d=1;d<=days;d++) sch[d]={main:sm[(d-1)%sm.length],sides:[ss[(d*2-2)%ss.length],ss[(d*2-1)%ss.length]]};
  schedule[`${y}-${m}`]=sch;
}
function getSchedule(y,m){const k=`${y}-${m}`;if(!schedule[k])generateSchedule(y,m);return schedule[k];}

function modeBadge(mode){
  const colors={
    '普通炊飯':'background:#d1fae5;color:#065f46',
    '早炊き':'background:#fef9c3;color:#854d0e',
    '煮込み':'background:#fed7aa;color:#9a3412',
    '蒸し':'background:#dbeafe;color:#1e40af',
    '保温':'background:#f3e8ff;color:#6b21a8'
  };
  return `<span style="font-size:11px;padding:2px 8px;border-radius:4px;${colors[mode]||''}">${mode}</span>`;
}

function renderCalendar(){
  document.getElementById('month-label').textContent=`${currentYear}年${currentMonth+1}月`;
  const cal=document.getElementById('calendar');
  const dn=['日','月','火','水','木','金','土'],dc=['sun','','','','','','sat'];
  let html=dn.map((d,i)=>`<div class="day-header ${dc[i]}">${d}</div>`).join('');
  const first=getFirstDay(currentYear,currentMonth),total=getDaysInMonth(currentYear,currentMonth);
  const sch=getSchedule(currentYear,currentMonth),today=new Date();
  for(let i=0;i<first;i++) html+=`<div class="day-cell empty"></div>`;
  for(let d=1;d<=total;d++){
    const dow=(first+d-1)%7,isToday=today.getFullYear()===currentYear&&today.getMonth()===currentMonth&&today.getDate()===d;
    const meal=sch[d],nc=dow===0?'sun':dow===6?'sat':'';
    html+=`<div class="day-cell${isToday?' today':''}" onclick="openDay(${d})">
      <div class="day-num ${nc}">${d}</div>
      ${meal?`<span class="meal-tag main-tag">${meal.main.name}</span><span class="meal-tag side-tag">${meal.sides[0].name}</span><span class="meal-tag side-tag">${meal.sides[1].name}</span>`:''}
    </div>`;
  }
  cal.innerHTML=html;
}
function openDay(d){
  const sch=getSchedule(currentYear,currentMonth),meal=sch[d];
  if(!meal) return;
  const pLabel=`${persons}人分`;
  document.getElementById('modal-date').textContent=`${currentMonth+1}月${d}日のメニュー`;
  const sidesHtml=meal.sides.map((s,idx)=>`
    <div style="margin-bottom:12px">
      <div class="meal-section-header">
        <div class="section-label">副菜${idx+1}：${s.name} ${modeBadge(s.mode)}</div>
        <button class="shuffle-btn" onclick="swapSide(${d},${idx})">変える</button>
      </div>
      <div class="recipe-box">
        <div class="recipe-title">材料（${pLabel}目安）</div><div>${getIng(s,persons)}</div>
        ${s.tip?`<div class="recipe-title" style="margin-top:6px">炊飯器のコツ</div><div style="color:#c07020">${s.tip}</div>`:''}
        <div class="recipe-title" style="margin-top:6px">作り方</div><div>${s.recipe.replace(/。(?!$)/g,'。<br>')}</div>
      </div>
    </div>`).join('');
  document.getElementById('modal-body').innerHTML=`
    <div class="meal-section-header">
      <div class="section-label">主菜：${meal.main.name} ${modeBadge(meal.main.mode)} <span class="portion-badge">${pLabel}</span></div>
      <button class="shuffle-btn" onclick="swapMain(${d})">変える</button>
    </div>
    <div class="recipe-box">
      <div class="recipe-title">材料</div><div>${getIng(meal.main,persons)}</div>
      ${meal.main.tip?`<div class="recipe-title" style="margin-top:6px">炊飯器のコツ</div><div style="color:#c07020">${meal.main.tip}</div>`:''}
      <div class="recipe-title" style="margin-top:6px">作り方</div><div>${meal.main.recipe.replace(/。(?!$)/g,'。<br>')}</div>
    </div>
    <div class="divider"></div>
    ${sidesHtml}`;
  document.getElementById('modal-overlay').classList.add('open');
}
function swapMain(d){
  const k=`${currentYear}-${currentMonth}`,sch=schedule[k],cur=sch[d].main;
  const others=mainDishes.filter(m=>m.id!==cur.id);
  if(others.length){sch[d].main=others[Math.floor(Math.random()*others.length)];renderCalendar();openDay(d);}
}
function swapSide(d,idx){
  const k=`${currentYear}-${currentMonth}`,sch=schedule[k],cur=sch[d].sides[idx];
  const avail=sideDishes.filter(s=>s.id!==cur.id&&s.id!==sch[d].sides[1-idx].id);
  if(avail.length){sch[d].sides[idx]=avail[Math.floor(Math.random()*avail.length)];renderCalendar();openDay(d);}
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay')) closeModal();}
function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth<0){currentMonth=11;currentYear--;}
  if(currentMonth>11){currentMonth=0;currentYear++;}
  renderCalendar();
}
function regen(){delete schedule[`${currentYear}-${currentMonth}`];renderCalendar();}
function renderManage(){
  document.getElementById('main-count').textContent=mainDishes.length;
  document.getElementById('side-count').textContent=sideDishes.length;
  document.getElementById('main-list').innerHTML=mainDishes.map(d=>`<div class="dish-item"><span class="dish-item-name">${d.name}</span><span class="dish-item-cat">${d.cat}</span><span style="font-size:11px;color:#c07020">${d.mode}</span></div>`).join('');
  document.getElementById('side-list').innerHTML=sideDishes.map(d=>`<div class="dish-item"><span class="dish-item-name">${d.name}</span><span class="dish-item-cat">${d.cat}</span><span style="font-size:11px;color:#c07020">${d.mode}</span></div>`).join('');
}
function addDish(){
  const name=document.getElementById('new-name').value.trim();
  if(!name){alert('料理名を入力してください');return;}
  const dish={id:Date.now(),name,cat:document.getElementById('new-cat').value,mode:document.getElementById('new-mode').value,
    ing2:document.getElementById('new-ing2').value.trim(),
    ing5:document.getElementById('new-ing5').value.trim(),
    tip:document.getElementById('new-tip').value.trim(),
    recipe:document.getElementById('new-recipe').value.trim()};
  if(document.getElementById('new-type').value==='main') mainDishes.push(dish); else sideDishes.push(dish);
  ['new-name','new-ing2','new-ing5','new-recipe','new-tip'].forEach(id=>document.getElementById(id).value='');
  renderManage();
  alert(`「${name}」を追加しました！`);
}
function downloadJSON(){
  const sch=getSchedule(currentYear,currentMonth);
  const data={version:1,year:currentYear,month:currentMonth+1,persons,mainDishes,sideDishes,
    schedule:Object.fromEntries(Object.entries(sch).map(([d,m])=>([d,{mainId:m.main.id,sideIds:m.sides.map(s=>s.id)}])))};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`炊飯器献立_${currentYear}年${currentMonth+1}月.json`;
  a.click();
}
function importJSON(event){
  const file=event.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.version!==1) throw new Error();
      data.mainDishes.forEach(d=>{if(!mainDishes.find(m=>m.id===d.id)) mainDishes.push(d);});
      data.sideDishes.forEach(d=>{if(!sideDishes.find(s=>s.id===d.id)) sideDishes.push(d);});
      const y=data.year,m=data.month-1,rebuilt={};
      for(const [day,ids] of Object.entries(data.schedule)){
        const main=mainDishes.find(d=>d.id===ids.mainId);
        const sides=ids.sideIds.map(id=>sideDishes.find(d=>d.id===id));
        if(main&&sides.every(Boolean)) rebuilt[day]={main,sides};
      }
      schedule[`${y}-${m}`]=rebuilt;
      currentYear=y;currentMonth=m;renderCalendar();
      alert(`${y}年${m+1}月の献立を読み込みました！`);
    }catch{alert('読み込みに失敗しました。');}
  };
  reader.readAsText(file);event.target.value='';
}
function printMonth(){
  const sch=getSchedule(currentYear,currentMonth);
  const days=getDaysInMonth(currentYear,currentMonth),first=getFirstDay(currentYear,currentMonth);
  let rows='';
  for(let d=1;d<=days;d++){
    const m=sch[d];if(!m) continue;
    const dow=['日','月','火','水','木','金','土'][(first+d-1)%7];
    rows+=`<tr><td>${d}日（${dow}）</td><td>${m.main.name}<br><small style="color:#c07020">${m.main.mode}</small></td><td style="font-size:11px;color:#555">${getIng(m.main,persons)}</td><td>${m.sides[0].name}<br><small style="color:#c07020">${m.sides[0].mode}</small></td><td>${m.sides[1].name}<br><small style="color:#c07020">${m.sides[1].mode}</small></td></tr>`;
  }
  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>${currentYear}年${currentMonth+1}月 炊飯器献立</title><style>body{font-family:'Hiragino Kaku Gothic Pro','Meiryo',sans-serif;padding:20px;font-size:13px}h1{font-size:18px;font-weight:700;margin-bottom:4px}.sub{font-size:12px;color:#666;margin-bottom:16px}table{width:100%;border-collapse:collapse}th,td{padding:7px 8px;border:1px solid #ccc;text-align:left;vertical-align:top}th{background:#fde8cc;font-weight:700;font-size:12px}tr:nth-child(even){background:#fff8f0}@media print{button{display:none}}</style></head><body><h1>🍚 ${currentYear}年${currentMonth+1}月 炊飯器レシピ献立</h1><div class="sub">${persons}人分目安 ／ 炊飯器まかせ</div><button onclick="window.print()" style="margin-bottom:16px;padding:6px 16px;cursor:pointer;font-size:13px">印刷する</button><table><thead><tr><th style="width:80px">日付</th><th style="width:140px">主菜</th><th>材料目安</th><th style="width:130px">副菜1</th><th style="width:130px">副菜2</th></tr></thead><tbody>${rows}</tbody></table></body></html>`);
  win.document.close();
}
renderCalendar();
</script>
