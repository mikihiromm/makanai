<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>炊飯器レシピ管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f5f7f5;color:#1a3a2a;min-height:100vh}
.header{background:#2D6A4F;color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:500}
.serving-wrap{display:flex;align-items:center;gap:8px;font-size:13px}
.serving-wrap select{padding:4px 10px;border-radius:6px;border:none;font-size:13px;background:#fff;color:#1a3a2a}
.tabs{background:#fff;border-bottom:1px solid #e0ede6;display:flex}
.tab{padding:14px 24px;border:none;background:none;cursor:pointer;font-size:14px;color:#6b8f7a;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#2D6A4F;border-bottom-color:#2D6A4F;font-weight:500}
.content{padding:1.5rem;max-width:1000px;margin:0 auto}
.view{display:none}.view.active{display:block}

/* カレンダー */
.cal-header{display:flex;align-items:center;gap:16px;margin-bottom:1rem}
.cal-nav{background:#fff;border:1px solid #c8ddd2;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:16px;color:#2D6A4F}
.cal-month{font-size:18px;font-weight:500;color:#1a3a2a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:12px;color:#6b8f7a;padding:6px 0;font-weight:500}
.cal-day{border-radius:8px;border:1px solid #e0ede6;padding:6px;cursor:pointer;background:#fff;min-height:70px;display:flex;flex-direction:column;gap:2px;transition:border-color .15s}
.cal-day:hover{border-color:#52B788}
.cal-day.empty{background:transparent;border-color:transparent;cursor:default}
.cal-day.today{border-color:#52B788;background:#f0faf4}
.cal-day.has-menu{background:#e8f5ee}
.dnum{font-size:11px;color:#6b8f7a;font-weight:500}
.today .dnum{color:#2D6A4F;font-weight:700}
.dmain{font-size:10px;color:#1a3a2a;line-height:1.3;margin-top:2px}
.dsub{font-size:9px;color:#6b8f7a;line-height:1.3}

/* スライドパネル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.overlay.open{display:block}
.panel{position:fixed;top:0;right:-460px;width:460px;height:100vh;background:#fff;overflow-y:auto;transition:right .3s;z-index:201;box-shadow:-4px 0 20px rgba(0,0,0,.1)}
.panel.open{right:0}
.panel-inner{padding:1.5rem}
.panel h2{font-size:17px;font-weight:500;color:#1a3a2a;margin-bottom:4px}
.panel-sub{font-size:12px;color:#6b8f7a;margin-bottom:1.2rem}
.close-btn{position:absolute;top:1rem;right:1rem;background:none;border:1px solid #e0ede6;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;color:#6b8f7a}
.sec-label{font-size:12px;color:#6b8f7a;margin-bottom:6px;margin-top:1.2rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.recipe-sel{width:100%;padding:10px;border:1px solid #e0ede6;border-radius:8px;font-size:14px;color:#1a3a2a;background:#f8faf8;margin-bottom:10px}
.recipe-card{background:#f5f9f6;border:1px solid #e0ede6;border-radius:10px;padding:1rem;margin-bottom:10px}
.recipe-card h3{font-size:15px;font-weight:500;color:#1a3a2a;margin-bottom:8px}
.badges{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge.cat{background:#d8f3dc;color:#1b5e38}
.badge.time{background:#fff3e0;color:#c45a0a}
.acc{border:1px solid #e0ede6;border-radius:8px;overflow:hidden;margin-top:8px}
.acc-btn{width:100%;text-align:left;padding:10px 14px;background:#e8f5ee;border:none;cursor:pointer;font-size:13px;font-weight:500;color:#2D6A4F;display:flex;justify-content:space-between;align-items:center}
.acc-body{padding:10px 14px;display:none;font-size:13px}
.acc-body.open{display:block}
.ing-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eef3ef}
.ing-row:last-child{border-bottom:none}
.steps-list{padding-left:1.2rem}
.steps-list li{margin-bottom:6px;line-height:1.6}
.save-btn{width:100%;padding:14px;background:#2D6A4F;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;margin-top:1.2rem}
.save-btn:hover{background:#1e5038}
.clear-btn{width:100%;padding:9px;background:none;border:1px solid #e55;color:#e55;border-radius:8px;font-size:13px;cursor:pointer;margin-top:8px}

/* レシピ一覧 */
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.chip{padding:6px 16px;border-radius:16px;border:1px solid #e0ede6;background:#fff;cursor:pointer;font-size:13px;color:#6b8f7a;transition:all .15s}
.chip.active{background:#2D6A4F;color:#fff;border-color:#2D6A4F}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.r-card{background:#fff;border:1px solid #e0ede6;border-radius:10px;padding:1rem;cursor:pointer;transition:all .15s}
.r-card:hover{border-color:#52B788;box-shadow:0 2px 10px rgba(45,106,79,.1)}
.r-card h3{font-size:14px;font-weight:500;margin-bottom:6px}
.r-card p{font-size:12px;color:#6b8f7a}

/* まとめ */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.stat{background:#fff;border:1px solid #e0ede6;border-radius:10px;padding:1rem}
.stat-label{font-size:12px;color:#6b8f7a;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:500;color:#2D6A4F}
.stat-unit{font-size:13px;color:#6b8f7a}
.sum-list{display:grid;gap:8px}
.sum-item{background:#fff;border:1px solid #e0ede6;border-radius:10px;padding:12px;display:flex;gap:12px;align-items:center}
.sum-day{font-size:20px;font-weight:600;color:#2D6A4F;min-width:44px}
.sum-info{}
.sum-main{font-size:14px;font-weight:500}
.sum-sub{font-size:12px;color:#6b8f7a}
.empty-msg{text-align:center;padding:3rem;color:#6b8f7a;font-size:14px}

@media(max-width:600px){
.panel{width:100%}
.content{padding:1rem}
.cal-grid{gap:3px}
.cal-day{min-height:55px;padding:4px}
.tab{padding:12px 14px;font-size:13px}
}
</style>
</head>
<body>

<div class="header">
  <h1>🍚 炊飯器レシピ管理</h1>
  <button onclick="downloadApp()" style="background:#52B788;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;border:none;cursor:pointer;font-weight:500;">⬇ 保存する</button>
  <div class="serving-wrap">
    <span>人数：</span>
    <select id="serving-sel" onchange="renderCalendar()">
      <option value="2">2人家族</option>
      <option value="5" selected>5人家族</option>
    </select>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showView('calendar',this)">📅 カレンダー</button>
  <button class="tab" onclick="showView('recipes',this)">📖 レシピ一覧</button>
  <button class="tab" onclick="showView('summary',this)">📊 月間まとめ</button>
</div>

<div class="content">

<div id="v-calendar" class="view active">
  <div class="cal-header">
    <button class="cal-nav" onclick="changeMonth(-1)">◀</button>
    <span class="cal-month" id="cal-label"></span>
    <button class="cal-nav" onclick="changeMonth(1)">▶</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<div id="v-recipes" class="view">
  <div class="filter-bar" id="filter-bar"></div>
  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<div id="v-summary" class="view">
  <div class="stats">
    <div class="stat"><div class="stat-label">登録済み日数</div><div class="stat-val" id="s-days">0<span class="stat-unit">日</span></div></div>
    <div class="stat"><div class="stat-label">総献立数</div><div class="stat-val" id="s-dishes">0<span class="stat-unit">品</span></div></div>
    <div class="stat"><div class="stat-label">月間カバー率</div><div class="stat-val" id="s-cover">0<span class="stat-unit">%</span></div></div>
    <div class="stat"><div class="stat-label">設定人数</div><div class="stat-val" id="s-srv">5<span class="stat-unit">人</span></div></div>
  </div>
  <div class="sum-list" id="sum-list"></div>
</div>

</div>

<!-- パネル -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-inner">
    <button class="close-btn" onclick="closePanel()">×</button>
    <h2 id="p-title">献立を設定</h2>
    <div class="panel-sub" id="p-sub"></div>

    <div class="sec-label">主菜（炊飯器料理）</div>
    <select class="recipe-sel" id="main-sel" onchange="showCard('main',this.value)">
      <option value="">── 主菜を選ぶ ──</option>
    </select>
    <div id="main-card"></div>

    <div class="sec-label">副菜（簡単・炊飯器不要）</div>
    <select class="recipe-sel" id="sub-sel" onchange="showCard('sub',this.value)">
      <option value="">── 副菜を選ぶ ──</option>
    </select>
    <div id="sub-card"></div>

    <button class="save-btn" onclick="saveMenu()">✓ この日の献立を保存</button>
    <button class="clear-btn" onclick="clearMenu()">献立をクリア</button>
  </div>
</div>

function getSrv(){return parseInt(document.getElementById('serving-sel').value)||5;}

function renderCalendar(){
  document.getElementById('cal-label').textContent=curY+'年'+(curM+1)+'月';
  var g=document.getElementById('cal-grid');
  g.innerHTML='';
  ['日','月','火','水','木','金','土'].forEach(function(d){
    var el=document.createElement('div');el.className='cal-dow';el.textContent=d;g.appendChild(el);
  });
  var first=new Date(curY,curM,1).getDay();
  var days=new Date(curY,curM+1,0).getDate();
  var td=new Date();
  for(var i=0;i<first;i++){var el=document.createElement('div');el.className='cal-day empty';g.appendChild(el);}
  for(var d=1;d<=days;d++){
    var key=curY+'-'+(curM+1)+'-'+d;
    var menu=menus[key];
    var el=document.createElement('div');
    el.className='cal-day'+(menu?' has-menu':'');
    if(td.getFullYear()===curY&&td.getMonth()===curM&&td.getDate()===d) el.className+=' today';
    var html='<div class="dnum">'+d+'</div>';
    if(menu&&menu.main){var m=MAINS.find(function(r){return r.id===menu.main;});if(m)html+='<div class="dmain">'+m.name+'</div>';}
    if(menu&&menu.sub){var s=SUBS.find(function(r){return r.id===menu.sub;});if(s)html+='<div class="dsub">'+s.name+'</div>';}
    el.innerHTML=html;
    (function(k,day){el.onclick=function(){openPanel(k,day);};})(key,d);
    g.appendChild(el);
  }
}

function changeMonth(d){
  curM+=d;
  if(curM>11){curM=0;curY++;}
  if(curM<0){curM=11;curY--;}
  renderCalendar();
}

function openPanel(key,day){
  selDate=key;
  document.getElementById('p-title').textContent=curY+'年'+(curM+1)+'月'+day+'日の献立';
  document.getElementById('p-sub').textContent='家族'+getSrv()+'人分の材料を表示';
  var menu=menus[key]||{};
  document.getElementById('main-sel').value=menu.main||'';
  document.getElementById('sub-sel').value=menu.sub||'';
  if(menu.main)showCard('main',menu.main);else document.getElementById('main-card').innerHTML='';
  if(menu.sub)showCard('sub',menu.sub);else document.getElementById('sub-card').innerHTML='';
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function showCard(type,id){
  var list=type==='main'?MAINS:SUBS;
  var r=list.find(function(x){return x.id===id;});
  var el=document.getElementById(type+'-card');
  if(!r){el.innerHTML='';return;}
  var srv=getSrv();
  var ing=srv>=5?r.i5:r.i2;
  var rows=ing.map(function(i){return '<div class="ing-row"><span>'+i[0]+'</span><span>'+i[1]+'</span></div>';}).join('');
  var steps=r.s.map(function(s,i){return '<li>'+(i+1)+'. '+s+'</li>';}).join('');
  el.innerHTML='<div class="recipe-card"><h3>'+r.name+'</h3>'
    +'<div class="badges"><span class="badge cat">'+r.cat+'</span><span class="badge time">約'+r.time+'分</span></div>'
    +'<p style="font-size:12px;color:#6b8f7a;margin-bottom:8px">'+r.desc+'</p>'
    +'<div class="acc">'
    +'<button class="acc-btn" onclick="toggleAcc(\''+type+'-ing\')">材料（'+getSrv()+'人分） <span>▾</span></button>'
    +'<div class="acc-body" id="'+type+'-ing">'+rows+'</div>'
    +'<button class="acc-btn" onclick="toggleAcc(\''+type+'-step\')">作り方 <span>▾</span></button>'
    +'<div class="acc-body" id="'+type+'-step"><ol class="steps-list">'+steps+'</ol></div>'
    +'</div></div>';
}

function toggleAcc(id){
  var el=document.getElementById(id);
  el.classList.toggle('open');
}

function saveMenu(){
  if(!selDate)return;
  var main=document.getElementById('main-sel').value;
  var sub=document.getElementById('sub-sel').value;
  if(!menus[selDate])menus[selDate]={};
  menus[selDate].main=main;
  menus[selDate].sub=sub;
  closePanel();
  renderCalendar();
  updateSummary();
}

function clearMenu(){
  if(selDate)delete menus[selDate];
  document.getElementById('main-sel').value='';
  document.getElementById('sub-sel').value='';
  document.getElementById('main-card').innerHTML='';
  document.getElementById('sub-card').innerHTML='';
  renderCalendar();
  updateSummary();
}

function showView(name,btn){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('v-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='recipes')renderRecipes();
  if(name==='summary')updateSummary();
}

var activeFilter='all';
function renderRecipes(){
  var cats=['all'].concat([...new Set(MAINS.map(function(r){return r.cat;}))]);
  var bar=document.getElementById('filter-bar');
  bar.innerHTML='';
  cats.forEach(function(c){
    var b=document.createElement('button');
    b.className='chip'+(c===activeFilter?' active':'');
    b.textContent=c==='all'?'すべて':c;
    b.onclick=function(){activeFilter=c;renderRecipes();};
    bar.appendChild(b);
  });
  var list=activeFilter==='all'?MAINS:MAINS.filter(function(r){return r.cat===activeFilter;});
  document.getElementById('recipe-grid').innerHTML=list.map(function(r){
    return '<div class="r-card" onclick="openRecipeFromList(\''+r.id+'\')">'
      +'<h3>'+r.name+'</h3>'
      +'<div class="badges"><span class="badge cat">'+r.cat+'</span><span class="badge time">'+r.time+'分</span></div>'
      +'<p>'+r.desc+'</p></div>';
  }).join('');
}

function openRecipeFromList(id){
  document.getElementById('main-sel').value=id;
  showCard('main',id);
  document.getElementById('sub-sel').value='';
  document.getElementById('sub-card').innerHTML='';
  document.getElementById('p-title').textContent='レシピ詳細';
  document.getElementById('p-sub').textContent='カレンダーから日付を選んで設定してください';
  document.getElementById('panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function updateSummary(){
  var prefix=curY+'-'+(curM+1)+'-';
  var days=Object.keys(menus).filter(function(k){return k.startsWith(prefix);});
  var totalDays=new Date(curY,curM+1,0).getDate();
  document.getElementById('s-days').innerHTML=days.length+'<span class="stat-unit">日</span>';
  document.getElementById('s-dishes').innerHTML=(days.length*2)+'<span class="stat-unit">品</span>';
  document.getElementById('s-cover').innerHTML=Math.round(days.length/totalDays*100)+'<span class="stat-unit">%</span>';
  document.getElementById('s-srv').innerHTML=getSrv()+'<span class="stat-unit">人</span>';
  var list=document.getElementById('sum-list');
  if(days.length===0){list.innerHTML='<div class="empty-msg">まだ献立が登録されていません<br>カレンダーから日付を選んで設定してください</div>';return;}
  list.innerHTML=days.sort().map(function(k){
    var menu=menus[k];var d=parseInt(k.split('-')[2]);
    var m=menu.main?MAINS.find(function(r){return r.id===menu.main;}):null;
    var s=menu.sub?SUBS.find(function(r){return r.id===menu.sub;}):null;
    return '<div class="sum-item"><div class="sum-day">'+d+'日</div>'
      +'<div class="sum-info"><div class="sum-main">'+(m?m.name:'主菜未設定')+'</div>'
      +'<div class="sum-sub">'+(s?s.name:'副菜未設定')+'</div></div></div>';
  }).join('');
}

function downloadApp(){
  var a=document.createElement('a');
  a.href=window.location.href;
  a.download='suihanki_app.html';
  a.click();
}

// 初期化
(function(){
  var ms=document.getElementById('main-sel');
  var ss=document.getElementById('sub-sel');
  MAINS.forEach(function(r){var o=document.createElement('option');o.value=r.id;o.textContent=r.name;ms.appendChild(o);});
  SUBS.forEach(function(r){var o=document.createElement('option');o.value=r.id;o.textContent=r.name;ss.appendChild(o);});
  renderCalendar();
})();
</script>
