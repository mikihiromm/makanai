<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賄い献立提案</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f7f6f2; color: #1a1a1a; min-height: 100vh; }
  header { background: #1a1a1a; color: #fff; padding: 16px 20px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
  header p { font-size: 11px; color: #999; margin-top: 2px; }
  .container { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; }
  .section { margin-bottom: 24px; }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 10px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 6px 13px; border-radius: 20px; border: 1px solid #ddd; font-size: 13px; cursor: pointer; background: #fff; color: #333; transition: all 0.15s; user-select: none; -webkit-tap-highlight-color: transparent; }
  .chip:active { transform: scale(0.96); }
  .chip.selected { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
  .selected-area { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 12px 14px; min-height: 50px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag { background: #f0f0f0; border-radius: 20px; padding: 4px 10px; font-size: 12px; color: #333; display: flex; align-items: center; gap: 4px; }
  .tag-x { cursor: pointer; color: #999; font-size: 14px; line-height: 1; }
  .empty-msg { font-size: 13px; color: #bbb; }
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
  .controls label { font-size: 13px; color: #666; }
  select { font-size: 14px; padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; background: #fff; color: #1a1a1a; -webkit-appearance: none; appearance: none; }
  .btn { padding: 10px 22px; background: #1a1a1a; border: none; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.15s; -webkit-tap-highlight-color: transparent; }
  .btn:active { opacity: 0.8; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .divider { border: none; border-top: 1px solid #e8e8e8; margin: 20px 0; }
  .set-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
  .set-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .set-num { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: #888; }
  .set-cost { font-size: 13px; font-weight: 700; color: #1a1a1a; }
  .dish-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .dish-box { border: 1px solid #f0f0f0; border-radius: 10px; padding: 10px 12px; background: #fafafa; }
  .dish-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; margin-bottom: 4px; }
  .label-main { color: #c0392b; }
  .label-side { color: #2980b9; }
  .dish-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; line-height: 1.3; }
  .dish-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 600; }
  .bc { background: #e8f5e9; color: #2e7d32; }
  .bt { background: #fff3e0; color: #e65100; }
  .bm { background: #ffebee; color: #c62828; }
  .dish-info { font-size: 11px; color: #666; line-height: 1.6; margin-bottom: 4px; }
  .ok { color: #2e7d32; }
  .missing { color: #c62828; font-weight: 600; }
  .steps-toggle { font-size: 11px; color: #2980b9; cursor: pointer; display: inline-block; margin-top: 4px; user-select: none; }
  .steps-body { font-size: 11px; color: #555; line-height: 1.9; margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px; display: none; }
  .note { font-size: 10px; color: #bbb; text-align: center; margin-top: 8px; }
  .no-result { font-size: 14px; color: #888; padding: 1rem 0; text-align: center; }
  @media (max-width: 400px) {
    .dish-row { grid-template-columns: 1fr; }
    .dish-name { font-size: 14px; }
  }
</style>
</head>
<body>

<header>
  <h1>賄い献立提案</h1>

  <div class="section-title" style="margin-bottom:10px">選んだ食材</div>
  <div class="selected-area" id="sel-area"><span class="empty-msg">食材を選んでください</span></div>
  <div style="height:16px"></div>

  <div class="controls">
    <label>人数：</label>
    <select id="portions">
      <option value="4">4人前</option>
      <option value="5">5人前</option>
      <option value="6" selected>6人前</option>
      <option value="7">7人前</option>
    </select>

  </div>

  <div id="result-area"></div>
</div>

const selected = new Set();

function renderChips() {
  Object.entries(CATS).forEach(([id, items]) => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = items.map(i => `<span class="chip" onclick="toggle(this,'${i}')">${i}</span>`).join('');
  });
}

function toggle(el, name) {
  if (selected.has(name)) { selected.delete(name); el.classList.remove('selected'); }
  else { selected.add(name); el.classList.add('selected'); }
  renderSelected();
}

function renderSelected() {
  const area = document.getElementById('sel-area');
  const btn = document.getElementById('search-btn');
  if (!selected.size) {
    area.innerHTML = '<span class="empty-msg">食材を選んでください</span>';
    btn.disabled = true; return;
  }
  btn.disabled = false;
  area.innerHTML = [...selected].map(n =>
    `<span class="tag">${n}<span class="tag-x" onclick="removeTag('${n}')">×</span></span>`
  ).join('');
}

function removeTag(name) {
  selected.delete(name);
  document.querySelectorAll('.chip').forEach(c => { if (c.textContent === name) c.classList.remove('selected'); });
  renderSelected();
}

function calcScore(menu) {
  const sel = [...selected];
  const mustOk = menu.must.some(m => sel.includes(m));
  if (!mustOk) return -1;
  const all = [...menu.main, ...menu.sub];
  const hits = all.filter(i => sel.includes(i)).length;
  return hits / Math.max(all.length, 1);
}

function getMissing(menu) {
  const sel = [...selected];
  return [...menu.main, ...menu.sub].filter(i => !sel.includes(i));
}

const openSteps = {};

function toggleSteps(id) {
  openSteps[id] = !openSteps[id];
  const el = document.getElementById('steps-' + id);
  const btn = document.getElementById('stbtn-' + id);
  if (el) el.style.display = openSteps[id] ? 'block' : 'none';
  if (btn) btn.textContent = openSteps[id] ? '手順を閉じる ▲' : '手順を見る ▼';
}

function doSearch() {
  const portions = document.getElementById('portions').value;
  const scoredMain = MAIN.map(m => ({m, s: calcScore(m)})).filter(x => x.s >= 0).sort((a,b) => b.s - a.s);
  const scoredSide = SIDE.map(m => ({m, s: calcScore(m)})).filter(x => x.s >= 0).sort((a,b) => b.s - a.s);
  const area = document.getElementById('result-area');

  if (!scoredMain.length && !scoredSide.length) {
    area.innerHTML = '<hr class="divider"><div class="no-result">選んだ食材に合う献立が見つかりませんでした。<br>別の食材も追加してみてください。</div>';
    return;
  }

  const mains = scoredMain.slice(0, 3);
  const sides = scoredSide.slice(0, 3);
  const sets = [];
  for (let i = 0; i < 3; i++) {
    const mn = mains[i % Math.max(mains.length, 1)];
    const sd = sides[i % Math.max(sides.length, 1)];
    if (mn && sd) sets.push({mn, sd});
  }

  if (!sets.length) {
    area.innerHTML = '<hr class="divider"><div class="no-result">組み合わせが見つかりませんでした。食材を追加してみてください。</div>';
    return;
  }

  area.innerHTML = '<hr class="divider"><div class="section-title" style="margin-bottom:14px">献立セットの提案（' + portions + '人前）</div>' +
    sets.map(({mn, sd}, idx) => {
      const totalCost = mn.m.cost + sd.m.cost;
      const mainMissing = getMissing(mn.m);
      const sideMissing = getMissing(sd.m);
      const mainId = 'm' + idx;
      const sideId = 's' + idx;
      return `
        <div class="set-card">
          <div class="set-header">
            <span class="set-num">セット ${idx+1}</span>
            <span class="set-cost">合計目安 ¥${totalCost}/人</span>
          </div>
          <div class="dish-row">
            <div class="dish-box">
              <div class="dish-label label-main">主菜</div>
              <div class="dish-name">${mn.m.name}</div>
              <div class="dish-meta">
                <span class="badge bc">¥${mn.m.cost}/人</span>
                <span class="badge bt">${mn.m.time}</span>
                ${mainMissing.length ? '<span class="badge bm">要購入あり</span>' : ''}
              </div>
              <div class="dish-info"><strong>分量：</strong>${mn.m.portions[portions]}</div>
              <div class="dish-info">${mainMissing.length ? '<strong>要購入：</strong><span class="missing">'+mainMissing.join('、')+'</span>' : '<span class="ok">購入不要</span>'}</div>
              <span class="steps-toggle" id="stbtn-${mainId}" onclick="toggleSteps('${mainId}')">手順を見る ▼</span>
              <div class="steps-body" id="steps-${mainId}">${mn.m.steps.map((s,i)=>(i+1)+'. '+s).join('<br>')}</div>
            </div>
            <div class="dish-box">
              <div class="dish-label label-side">副菜</div>
              <div class="dish-name">${sd.m.name}</div>
              <div class="dish-meta">
                <span class="badge bc">¥${sd.m.cost}/人</span>
                <span class="badge bt">${sd.m.time}</span>
                ${sideMissing.length ? '<span class="badge bm">要購入あり</span>' : ''}
              </div>
              <div class="dish-info">${sideMissing.length ? '<strong>要購入：</strong><span class="missing">'+sideMissing.join('、')+'</span>' : '<span class="ok">購入不要</span>'}</div>
              <span class="steps-toggle" id="stbtn-${sideId}" onclick="toggleSteps('${sideId}')">手順を見る ▼</span>
              <div class="steps-body" id="steps-${sideId}">${sd.m.steps.map((s,i)=>(i+1)+'. '+s).join('<br>')}</div>
            </div>
          </div>
          <div class="note">※ 汁物・ご飯は別途ご用意ください</div>
        </div>`;
    }).join('');
  area.scrollIntoView({behavior:'smooth', block:'start'});
}

renderChips();
</script>
